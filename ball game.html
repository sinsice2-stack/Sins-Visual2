<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud" style="display:none">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE: <b id="lvlNum">1</b></span>
        <span>TEMPO: <b id="timer">00:00:00</b></span>
        <span>MORTES: <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas" style="display:none"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

// SPRITES RESTAURADOS AO ORIGINAL
const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 
const assasSprites = [];
for (let i = 1; i <= 8; i++) {
    const img = new Image();
    img.src = `bola-amarela-assas${i.toString().padStart(4, '0')}.webp`;
    assasSprites.push(img);
}

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [], lasers = [];
let player = { x: 60, y: 300, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let spriteFrame = 0, spriteTimer = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; 
    startTime = Date.now();
    loadLevel(1); 
    gameLoop();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", g: "#440000", t: "#ff4500", lava: true, hasGun: true, grav: 0.8 };
    // CORREÇÃO: Fase 33 - Montanha com rampa (subida e descida)
    if (n === 33) return { bg: "#4a5b6d", g: "#2c3e50", t: "#ecf0f1", grav: 0.85, isMountain: true }; 
    if (n <= 50) return { bg: "#001a33", g: "#003366", t: "#00d4ff", water: true, grav: 0.2 }; 
    // CORREÇÃO: Fase dos Lasers (51-70) com lasers mais curtos e lentos
    if (n <= 70) return { bg: "#050505", g: "#111", t: "#f00", laser: true, grav: 0.8, isAssas: true, flappy: true }; 
    return { bg: "#000011", g: "#000", t: "#fff", space: true, grav: 0.05 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const b = getBiome(n);
    const lv = [];
    lasers = [];
    
    // CORREÇÃO: Lasers mais curtos (len: 40 ao invés de 90) e mais lentos (rotSpeed: 0.008 ao invés de 0.015)
    if (b.laser) {
        for(let i = 0; i < 12; i++) {
            lasers.push({ 
                x: 60 + (i * 80), 
                y: 80 + (random() * 380), 
                angle: random() * Math.PI * 2, 
                rotSpeed: 0.005 + (random() * 0.006), // Velocidade de rotação mais lenta (0.005-0.011)
                len: 35 + (random() * 15) // Comprimento reduzido: 35-50 pixels (antes era 90)
            });
        }
    }

    // CORREÇÃO: Fase Montanha - Rampa com subida e descida corretas
    if (b.isMountain) {
        // Não adicionar plataformas normais, apenas o terreno em rampa
        lv.push({x: 0, y: 480, w: 1000, h: 20, type: 'ground'});
        lv.push({x: 950, y: 130, type: 'goal'});
        return lv;
    }

    lv.push({x: 0, y: 400, w: 120, h: 500, c: b.g, t: b.t, type: 'normal'});
    let lx = 120, ly = 400;
    while (lx < 850) {
        lx += 110 + (random()*80); ly += (random()*120)-60;
        if (ly < 150) ly = 150; if (ly > 440) ly = 400;
        let type = (b.lava || b.laser) && random() > 0.8 ? 'spike' : 'normal';
        lv.push({x: lx, y: ly, w: 70, h: 25, c: type==='spike'?'#f00':b.g, t: type==='spike'?'#f00':b.t, type: type});
    }
    lv.push({x: 930, y: ly, w: 70, h: 500, c: b.g, t: b.t, type: 'normal'});
    lv.push({x: 960, y: ly, type: 'goal'});
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 60; player.y = 300; player.vx = player.vy = 0; 
    document.getElementById("lvlNum").innerText = n; 
}

// CORREÇÃO: Função para calcular altura da rampa na fase montanha
function getMountainHeight(x) {
    // Curva senoidal que começa baixo (subida) e termina alto (descida)
    // Inverteu a lógica: antes era descida primeiro, agora é subida primeiro
    let t = x / 1000; // 0 a 1
    // Subida suave nos primeiros 40% do percurso, depois descida
    let height;
    if (t < 0.4) {
        // SUBIDA: de 480 até 150
        height = 480 - (t / 0.4) * 330;
    } else {
        // DESCIDA: de 150 até 130 (final)
        height = 150 - ((t - 0.4) / 0.6) * 20;
    }
    return Math.max(130, Math.min(480, height));
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if(b.isAssas) { spriteTimer++; if(spriteTimer % 5 === 0) spriteFrame = (spriteFrame + 1) % 8; }

    // Controles do jogador
    if (keys[39]) player.vx += 0.8; 
    if (keys[37]) player.vx -= 0.8;
    
    // CORREÇÃO: Física da rampa na montanha (subida e descida com efeitos reais)
    if (b.isMountain) {
        // Obtém a altura do terreno na posição X atual e na próxima posição
        let currentGroundY = getMountainHeight(player.x);
        let nextGroundY = getMountainHeight(player.x + (player.vx > 0 ? 10 : -10));
        
        // Calcula a inclinação (diferença de altura)
        let slope = (nextGroundY - currentGroundY) / 20;
        
        // Aplica efeito da inclinação na velocidade
        if (Math.abs(slope) > 0.05) {
            if (slope > 0) {
                // SUBIDA: reduz velocidade e aplica resistência
                player.vx *= 0.98;
                player.vx -= Math.abs(slope) * 0.8;
            } else {
                // DESCIDA: aumenta velocidade (efeito de aceleração)
                player.vx += Math.abs(slope) * 1.2;
            }
        }
        
        // Limita velocidade máxima na rampa
        player.vx = Math.min(Math.max(player.vx, -12), 14);
        
        // Aplica gravidade e colisão com o terreno da rampa
        player.vy += b.grav;
        player.x += player.vx;
        player.y += player.vy;
        
        // Obtém altura do terreno na nova posição
        let groundY = getMountainHeight(player.x);
        
        // Colisão com o chão da rampa
        if (player.y + player.r > groundY) {
            player.grounded = true;
            player.canDoubleJump = true;
            player.vy = 0;
            player.y = groundY - player.r;
            
            // Ajusta posição horizontal se necessário
            player.x = Math.max(player.r, Math.min(1000 - player.r, player.x));
        } else {
            player.grounded = false;
        }
        
        // Impede que saia dos limites laterais
        player.x = Math.max(player.r, Math.min(1000 - player.r, player.x));
        
        // Verifica goal na fase montanha
        if (player.x > 930 && player.y + player.r > getMountainHeight(950) - 20) {
            loadLevel(currentLevel + 1);
        }
    } else {
        // Movimento normal para outras fases
        player.vy += b.grav; 
        player.vx *= 0.95; 
        player.x += player.vx; 
        player.y += player.vy;
        player.angle += player.vx * 0.1;

        if (player.x < player.r) player.x = player.r;
        if (player.x > 1000 - player.r) player.x = 1000 - player.r;
    }

    let timeDiff = Date.now() - startTime;
    let mins = Math.floor(timeDiff / 60000).toString().padStart(2, '0');
    let secs = Math.floor((timeDiff % 60000) / 1000).toString().padStart(2, '0');
    let msecs = Math.floor((timeDiff % 1000) / 10).toString().padStart(2, '0');
    document.getElementById("timer").innerText = mins+":"+secs+":"+msecs;

    for (let i = bullets.length - 1; i >= 0; i--) {
        let bu = bullets[i]; bu.x += bu.vx; bu.y += bu.vy;
        if(b.lava && bu.y > 480) {
            platforms.push({x: bu.x - 35, y: 480, w: 70, h: 20, c: '#add8e6', t: '#fff', type: 'ice'});
            bullets.splice(i, 1); continue;
        }
        if (bu.x < 0 || bu.x > 1000 || bu.y < 0 || bu.y > 500) bullets.splice(i, 1);
    }

    // CORREÇÃO: Lasers mais curtos já configurados no generateLevel
    lasers.forEach(l => {
        l.angle += l.rotSpeed;
        let x2 = l.x + Math.cos(l.angle) * l.len;
        let y2 = l.y + Math.sin(l.angle) * l.len;
        let dist = distToSegment({x: player.x, y: player.y}, {x: l.x, y: l.y}, {x: x2, y: y2});
        if (dist < player.r - 2) { deaths++; loadLevel(currentLevel); }
    });

    // Colisões com plataformas (apenas para fases não-montanha)
    if (!b.isMountain) {
        player.grounded = false;
        platforms.forEach(p => {
            if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 45) loadLevel(currentLevel + 1);
            if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
                if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
                if (player.vy > 0 && player.y < p.y + 15) { 
                    player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = p.y - player.r; 
                }
            }
        });
    }

    if (b.lava && player.y > 480) { deaths++; loadLevel(currentLevel); }
    if (player.y > 600 || player.y < -150) { deaths++; loadLevel(currentLevel); }
    document.getElementById("deathCount").innerText = deaths;
}

function distToSegment(p, v, w) {
    let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.fillStyle = b.bg; ctx.fillRect(0, 0, 1000, 500);

    if(b.lava) { ctx.fillStyle = "#ff4500"; ctx.fillRect(0, 480, 1000, 20); }

    // CORREÇÃO: Desenho da rampa na fase montanha
    if (b.isMountain) {
        ctx.beginPath();
        ctx.moveTo(0, getMountainHeight(0));
        for (let x = 0; x <= 1000; x += 10) {
            let y = getMountainHeight(x);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(1000, 500);
        ctx.lineTo(0, 500);
        ctx.closePath();
        ctx.fillStyle = "#5d3a1a";
        ctx.fill();
        ctx.strokeStyle = "#8b5a2b";
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Adiciona neve no topo da montanha
        ctx.fillStyle = "#fff";
        for (let x = 0; x <= 1000; x += 15) {
            let y = getMountainHeight(x);
            if (y < 200) {
                ctx.beginPath();
                ctx.arc(x, y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Desenha o goal no topo
        ctx.fillStyle = "#fff";
        ctx.fillRect(950, getMountainHeight(950) - 30, 4, 30);
        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.moveTo(950, getMountainHeight(950) - 35);
        ctx.lineTo(970, getMountainHeight(950) - 50);
        ctx.lineTo(930, getMountainHeight(950) - 50);
        ctx.fill();
    }

    // Desenha lasers (agora mais curtos)
    lasers.forEach(l => {
        ctx.save();
        ctx.translate(l.x, l.y);
        ctx.rotate(l.angle);
        ctx.strokeStyle = "#ff3366";
        ctx.lineWidth = 4;
        ctx.shadowBlur = 8;
        ctx.shadowColor = "#ff0000";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(l.len, 0);
        ctx.stroke();
        // Adiciona efeito de brilho na ponta
        ctx.fillStyle = "#ff6699";
        ctx.beginPath();
        ctx.arc(l.len, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else if (p.type !== 'ground') {
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4);
        }
    });

    bullets.forEach(bu => { ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(bu.x, bu.y, 6, 0, Math.PI * 2); ctx.fill(); });

    // RENDERIZAÇÃO ORIGINAL
    ctx.save(); ctx.translate(player.x, player.y); 
    if(b.isAssas) {
        ctx.drawImage(assasSprites[spriteFrame], -player.r * 1.6, -player.r, player.r * 3.2, player.r * 2);
    } else {
        ctx.rotate(player.angle); 
        ctx.drawImage(ballImg, -player.r, -player.r, player.r * 2, player.r * 2);
    }
    ctx.restore();

    if(b.hasGun) {
        ctx.save(); ctx.translate(player.x, player.y);
        let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        ctx.rotate(angle); 
        ctx.drawImage(gunImg, 10, -10, 30, 20);
        ctx.restore();
    }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        let b = getBiome(currentLevel);
        if (b.flappy) { player.vy = -7; } 
        else {
            if (player.grounded) { player.vy = -13; player.grounded = false; }
            else if (player.canDoubleJump) { player.vy = -11; player.canDoubleJump = false; }
        }
    }
    if (e.keyCode === 82) platforms = platforms.filter(p => p.type !== 'ice');
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);

window.addEventListener('mousedown', () => {
    let b = getBiome(currentLevel);
    if(!gameRunning || !b.hasGun) return;
    let a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*15, vy: Math.sin(a)*15});
});

canvas.addEventListener('mousemove', e => { 
    let r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; 
});
</script>
</body>
</html>
