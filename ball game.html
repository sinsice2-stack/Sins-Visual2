<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Rampa da Montanha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); display: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; display: none; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, platforms = [];
let player = { x: 60, y: 350, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let camY = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; startTime = Date.now(); loadLevel(1); gameLoop();
}

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    return { bg: "#576d85", grav: 0.9, isMountain: true }; 
}

function generateLevel(n) {
    const biome = getBiome(n);
    const lv = [];
    
    // Início
    lv.push({x: 0, y: 400, w: 150, h: 500, c: "#333", t: "#fff", type: 'normal'});
    
    if (biome.isMountain) {
        let curX = 150, curY = 400;
        // RAMPA DA MONTANHA (Igual a foto)
        for(let i = 0; i < 45; i++) {
            curX += 20; // largura de cada degrau da rampa
            curY -= 15; // altura da subida
            if(curX > 900) break; // Trava antes do fim da tela
            lv.push({ x: curX, y: curY, w: 22, h: 1000, c: "#333", t: "#fff", type: 'normal' });
        }
        // Topo com Bandeira
        lv.push({ x: curX, y: curY, w: 100, h: 1000, c: "#333", t: "#fff", type: 'normal' });
        lv.push({ x: curX + 40, y: curY, type: 'goal' });
    } else {
        lv.push({x: 800, y: 350, w: 100, h: 500, c: "#444", t: "#666", type: 'normal'});
        lv.push({x: 850, y: 350, type: 'goal'});
    }
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; platforms = generateLevel(n); 
    player.x = 40; player.y = 350; player.vx = player.vy = 0; 
    camY = 0; document.getElementById("lvlNum").innerText = n; 
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    
    if (keys[39]) player.vx += 0.8; 
    if (keys[37]) player.vx -= 0.8;
    
    player.vy += b.grav;
    player.vx *= 0.95;
    player.x += player.vx;
    player.y += player.vy;
    player.angle += player.vx * 0.1;

    // BLOQUEIO DA TELA DIREITA (Não deixa cair no canto)
    if (player.x > 980) { player.x = 980; player.vx = 0; }
    if (player.x < 20) { player.x = 20; player.vx = 0; }

    if(b.isMountain) {
        let targetCam = player.y - 250;
        camY += (targetCam - camY) * 0.15;
    } else { camY = 0; }

    player.grounded = false;
    platforms.forEach(p => {
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 40) loadLevel(currentLevel + 1);
        if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (player.vy > 0 && player.y < p.y + 25) { 
                player.grounded = true; player.canDoubleJump = true; 
                player.vy = 0; player.y = p.y - player.r; 
            } else { player.vx *= -0.5; }
        }
    });

    if (player.y > camY + 800) { deaths++; loadLevel(currentLevel); }
    document.getElementById("deathCount").innerText = deaths;
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.save(); ctx.translate(0, -camY);

    ctx.fillStyle = b.bg; ctx.fillRect(-100, camY - 500, 1200, 2000);

    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); 
            ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else {
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 8); // Topo branco (neve)
        }
    });

    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.drawImage(ballImg, -player.r, -player.r, player.r*2, player.r*2); ctx.restore();

    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        if (player.grounded) { player.vy = -14; player.grounded = false; }
        else if (player.canDoubleJump) { player.vy = -12; player.canDoubleJump = false; }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);
</script>
</body>
</html>
