<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud" style="display:none">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas" style="display:none"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

// SPRITES
const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 
const assasSprites = [];
for (let i = 1; i <= 8; i++) {
    const img = new Image();
    img.src = `bola-amarela-assas${i.toString().padStart(4, '0')}.webp`;
    assasSprites.push(img);
}

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [], lasers = [];
let player = { x: 60, y: 300, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let spriteFrame = 0, spriteTimer = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; 
    startTime = Date.now();
    loadLevel(1); 
    gameLoop();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", g: "#440000", t: "#ff4500", lava: true, hasGun: true, grav: 0.8 };
    if (n === 33) return { bg: "#4a5b6d", g: "#2c3e50", t: "#ecf0f1", grav: 0.95, isMountain: true }; 
    if (n <= 50) return { bg: "#001a33", g: "#003366", t: "#00d4ff", water: true, grav: 0.2 }; 
    if (n <= 70) return { bg: "#050505", g: "#111", t: "#f00", laser: true, grav: 0.85, isAssas: true }; 
    return { bg: "#000011", g: "#000", t: "#fff", space: true, grav: 0.05 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const b = getBiome(n);
    const lv = [];
    lasers = [];
    
    // CORREÇÃO LASERS (Fase 62 corrigida)
    if (b.laser) {
        let numLasers = 7;
        for(let i=0; i < numLasers; i++) {
            lasers.push({ 
                x: 100 + (i * 130), 
                y: 100 + (random() * 300), 
                angle: random() * Math.PI, 
                rotSpeed: 0.012, 
                len: 85 
            });
        }
    }

    // MONSTANHA: Remove degraus e deixa rampa limpa
    if (b.isMountain) {
        lv.push({x: 950, y: 400, type: 'goal'});
        return lv;
    }

    // Geração de plataformas normal com cores seguras
    lv.push({x: 0, y: 400, w: 120, h: 500, c: b.g, t: b.t, type: 'normal'});
    let lx = 120, ly = 400;
    while (lx < 850) {
        lx += 110 + (random()*80); ly += (random()*120)-60;
        if (ly < 150) ly = 150; if (ly > 440) ly = 400;
        let type = (b.lava || b.laser) && random() > 0.8 ? 'spike' : 'normal';
        lv.push({x: lx, y: ly, w: 70, h: 25, c: type==='spike'?'#f00':b.g, t: type==='spike'?'#f00':b.t, type: type});
    }
    lv.push({x: 930, y: ly, w: 70, h: 500, c: b.g, t: b.t, type: 'normal'});
    lv.push({x: 960, y: ly, type: 'goal'});
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 60; player.y = 300; player.vx = player.vy = 0; 
    document.getElementById("lvlNum").innerText = n; 
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if(b.isAssas) { spriteTimer++; if(spriteTimer % 5 === 0) spriteFrame = (spriteFrame + 1) % 8; }

    if (keys[39]) player.vx += 0.8; if (keys[37]) player.vx -= 0.8;
    
    // FÍSICA MONTANHA LONGA E LISA
    if (b.isMountain) {
        if (player.x < 500) player.vx -= 0.2; // Subida pesada
        else player.vx += 0.3; // Descida rápida
        
        let groundY = 460 - Math.sin((player.x / 1000) * Math.PI) * 280;
        if (player.y + player.r > groundY) {
            player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = groundY - player.r;
        }
    }

    player.vy += b.grav; player.vx *= 0.95; player.x += player.vx; player.y += player.vy;
    player.angle += player.vx * 0.1;

    // Bloqueios de tela
    if (player.x < player.r) player.x = player.r;
    if (player.x > 1000 - player.r) player.x = 1000 - player.r;

    // Timer
    let timeDiff = Date.now() - startTime;
    let mins = Math.floor(timeDiff / 60000).toString().padStart(2, '0');
    let secs = Math.floor((timeDiff % 60000) / 1000).toString().padStart(2, '0');
    let msecs = Math.floor((timeDiff % 1000) / 10).toString().padStart(2, '0');
    document.getElementById("timer").innerText = `${mins}:${secs}:${msecs}`;

    lasers.forEach(l => {
        l.angle += l.rotSpeed;
        let x2 = l.x + Math.cos(l.angle) * l.len;
        let y2 = l.y + Math.sin(l.angle) * l.len;
        let dist = distToSegment({x: player.x, y: player.y}, {x: l.x, y: l.y}, {x: x2, y: y2});
        if (dist < player.r - 2) { deaths++; loadLevel(currentLevel); }
    });

    player.grounded = false;
    platforms.forEach(p => {
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 45) loadLevel(currentLevel + 1);
        if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
            if (player.vy > 0 && player.y < p.y + 15) { 
                player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = p.y - player.r; 
            }
        }
    });

    if (player.y > 600) { deaths++; loadLevel(currentLevel); }
    document.getElementById("deathCount").innerText = deaths;
}

function distToSegment(p, v, w) {
    let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.fillStyle = b.bg; ctx.fillRect(0, 0, 1000, 500);

    // Desenha a Rampa da Montanha (Sem degraus)
    if (b.isMountain) {
        ctx.beginPath(); ctx.moveTo(0, 500);
        for (let x = 0; x <= 1000; x += 5) {
            let y = 460 - Math.sin((x / 1000) * Math.PI) * 280;
            ctx.lineTo(x, y);
        }
        ctx.lineTo(1000, 500);
        ctx.fillStyle = b.g; ctx.fill();
        ctx.strokeStyle = b.t; ctx.lineWidth = 4; ctx.stroke();
    }

    lasers.forEach(l => {
        ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.angle);
        ctx.strokeStyle = "red"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(l.len, 0); ctx.stroke(); ctx.restore();
    });

    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else {
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4);
        }
    });

    ctx.save(); ctx.translate(player.x, player.y); 
    if(b.isAssas) {
        ctx.drawImage(assasSprites[spriteFrame], -player.r * 1.6, -player.r, player.r * 3.2, player.r * 2);
    } else {
        ctx.rotate(player.angle); ctx.drawImage(ballImg, -player.r, -player.r, player.r * 2, player.r * 2);
    }
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        if (player.grounded) { player.vy = -13; player.grounded = false; }
        else if (player.canDoubleJump) { player.vy = -11; player.canDoubleJump = false; }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);
</script>
</body>
</html>
