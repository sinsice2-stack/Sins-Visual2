<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        b { color: #00fbff; font-size: 24px; }
        .victory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0033, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 1s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes glow {
            0% { text-shadow: 0 0 10px gold; }
            100% { text-shadow: 0 0 30px orange; }
        }
        .victory-title {
            font-size: 72px;
            font-weight: bold;
            color: gold;
            animation: glow 0.5s infinite alternate;
            margin-bottom: 20px;
        }
        .victory-stats {
            font-size: 24px;
            margin: 20px;
            text-align: center;
            line-height: 2;
        }
        .victory-stats span {
            color: #00fbff;
            font-weight: bold;
            font-size: 32px;
        }
        .restart-btn {
            padding: 15px 40px;
            margin-top: 30px;
            font-size: 20px;
            cursor: pointer;
            background: gold;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .restart-btn:hover {
            transform: scale(1.1);
            background: orange;
            box-shadow: 0 0 30px gold;
        }
    </style>
</head>
<body>

    <div class="hud" id="gameHud" style="display:none">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE: <b id="lvlNum">1</b></span>
        <span>TEMPO: <b id="timer">00:00:00</b></span>
        <span>MORTES: <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas" style="display:none"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

// SPRITES
const ballImg = new Image(); 
ballImg.src = 'bola amarela.webp'; 

const gunImg = new Image(); 
gunImg.src = 'arma-de-gelo.webp'; 

// Sprites do Assas com escala proporcional e maior (sem distorção)
const assasSprites = [];
const assasSpriteData = [];
let assasLoadedCount = 0;
const totalAssasSprites = 8;

for (let i = 1; i <= 8; i++) {
    const img = new Image();
    img.src = `bola-amarela-assas${i.toString().padStart(4, '0')}.webp`;
    img.onload = (function(idx) {
        return function() {
            // Define um tamanho alvo maior que o diâmetro da bola para ficar mais visível
            const targetSize = 52; // 36 * 1.44 ≈ 52px – ajuste conforme preferir
            const imgW = this.width;
            const imgH = this.height;
            // Escala baseada no maior lado para que o sprite ocupe o targetSize
            const scale = targetSize / Math.max(imgW, imgH);
            assasSpriteData[idx] = { w: imgW, h: imgH, scale: scale };
            assasLoadedCount++;
        };
    })(i-1);
    assasSprites.push(img);
    assasSpriteData.push(null);
}

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [], lasers = [];
let player = { x: 60, y: 300, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let spriteFrame = 0, spriteTimer = 0;
let cameraX = 0;
let mountainWidth = 3000;
let playerName = "";

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    playerName = input.toUpperCase();
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = playerName;
    canvas.style.display = "block";
    gameRunning = true; 
    startTime = Date.now();
    deaths = 0;
    document.getElementById("deathCount").innerText = deaths;
    loadLevel(1); 
    gameLoop();
}

function showVictory() {
    gameRunning = false;
    canvas.style.display = "none";
    document.getElementById("gameHud").style.display = "none";
    
    const timeDiff = Date.now() - startTime;
    const mins = Math.floor(timeDiff / 60000);
    const secs = Math.floor((timeDiff % 60000) / 1000);
    const totalDeaths = deaths;
    
    const victoryDiv = document.createElement("div");
    victoryDiv.className = "victory-overlay";
    victoryDiv.innerHTML = `
        <div class="victory-title">✨ VITÓRIA! ✨</div>
        <div class="victory-stats">
            🎮 JOGADOR: <span>${playerName}</span><br>
            ⭐ FASES COMPLETAS: <span>100</span><br>
            💀 TOTAL DE MORTES: <span>${totalDeaths}</span><br>
            ⏱️ TEMPO TOTAL: <span>${mins} minutos e ${secs} segundos</span><br>
            🏆 VOCÊ CONQUISTOU A SUPER BALL! 🏆
        </div>
        <button class="restart-btn" onclick="restartGame()">▶ JOGAR NOVAMENTE</button>
    `;
    document.body.appendChild(victoryDiv);
}

function restartGame() {
    const victoryDiv = document.querySelector(".victory-overlay");
    if (victoryDiv) victoryDiv.remove();
    startGame();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n === 100) return { bg: "#FFD700", g: "#FFA500", t: "#FFFFFF", grav: 0.8, isFinal: true };
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", g: "#440000", t: "#ff4500", lava: true, hasGun: true, grav: 0.8 };
    if (n === 33) return { bg: "#1a2a3a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "vertical" };
    if (n === 34) return { bg: "#2a1a2a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "zigzag" };
    if (n === 35) return { bg: "#1a3a2a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "floating" };
    if (n === 36) return { bg: "#3a2a1a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "cave" };
    if (n === 37) return { bg: "#2a1a3a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "spiral" };
    if (n === 38) return { bg: "#1a2a2a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "inverse" };
    if (n === 39) return { bg: "#3a1a2a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "chaos" };
    if (n === 40) return { bg: "#0a0f1a", g: "#2C1810", t: "#CD853F", grav: 0.8, isMountain: true, mountainType: "final" };
    if (n <= 50) return { bg: "#001a33", g: "#003366", t: "#00d4ff", water: true, grav: 0.2 }; 
    if (n <= 70) return { bg: "#050505", g: "#111", t: "#f00", laser: true, grav: 0.8, isAssas: true, flappy: true }; 
    if (n <= 90) return { bg: "#4a1a2a", g: "#2a0a1a", t: "#ff66cc", grav: 0.85, hasGun: true, isAssas: true };
    return { bg: "#000011", g: "#000", t: "#fff", space: true, grav: 0.05 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const b = getBiome(n);
    const lv = [];
    lasers = [];
    
    if (n === 100) {
        lv.push({x: 0, y: 300, w: 1000, h: 200, c: "#FFD700", t: "#FFA500", type: 'normal'});
        lv.push({x: 450, y: 200, type: 'goal'});
        return lv;
    }
    
    if (b.laser) {
        for(let i = 0; i < 12; i++) {
            let safeX = 150 + (random() * 800);
            lasers.push({ 
                x: safeX, 
                y: 50 + (random() * 400), 
                angle: random() * Math.PI * 2, 
                rotSpeed: 0.005 + (random() * 0.006),
                len: 35 + (random() * 15)
            });
        }
    }

    if (b.isMountain) {
        lv.push({x: 0, y: 480, w: mountainWidth, h: 20, type: 'ground'});
        lv.push({x: mountainWidth - 80, y: 80, type: 'goal'});
        return lv;
    }

    lv.push({x: 0, y: 400, w: 120, h: 500, c: b.g, t: b.t, type: 'normal'});
    let lx = 120, ly = 400;
    while (lx < 850) {
        lx += 110 + (random()*80); ly += (random()*120)-60;
        if (ly < 150) ly = 150; if (ly > 440) ly = 400;
        let type = (b.lava || b.laser) && random() > 0.8 ? 'spike' : 'normal';
        lv.push({x: lx, y: ly, w: 70, h: 25, c: type==='spike'?'#f00':b.g, t: type==='spike'?'#f00':b.t, type: type});
    }
    lv.push({x: 930, y: ly, w: 70, h: 500, c: b.g, t: b.t, type: 'normal'});
    lv.push({x: 960, y: ly, type: 'goal'});
    return lv;
}

function loadLevel(n) { 
    if (n > 100) {
        showVictory();
        return;
    }
    
    currentLevel = n; 
    bullets = []; 
    platforms = generateLevel(n); 
    cameraX = 0;
    
    let b = getBiome(n);
    if (b.laser) {
        player.x = 40;
        player.y = 250;
    } else if (b.isMountain) {
        player.x = 50;
        player.y = 300;
    } else if (n === 100) {
        player.x = 100;
        player.y = 250;
    } else {
        player.x = 60;
        player.y = 300;
    }
    
    player.vx = 0;
    player.vy = 0;
    player.angle = 0;
    player.grounded = false;
    player.canDoubleJump = true;
    
    document.getElementById("lvlNum").innerText = n; 
}

function getMountainHeight(x, phase) {
    let t = x / mountainWidth;
    
    if (phase === 33) return 480 - t * 400;
    if (phase === 34) return 380 - Math.sin(t * Math.PI * 3) * 180;
    if (phase === 35) {
        let platform = Math.floor(t * 10);
        let platformY = [480, 420, 360, 300, 260, 220, 180, 140, 100, 80];
        return platformY[Math.min(platform, 9)];
    }
    if (phase === 36) {
        let ceiling = 200 + Math.sin(t * Math.PI * 3) * 60;
        let floor = 480 - t * 300;
        return Math.min(floor, ceiling - 50);
    }
    if (phase === 37) return 300 + Math.sin(t * Math.PI * 5) * 120;
    if (phase === 38) return 150 + t * 330;
    if (phase === 39) return 300 + Math.sin(t * Math.PI * 12) * 180;
    if (phase === 40) {
        if (t < 0.3) return 480 - t * 500;
        if (t < 0.6) return 330 - Math.sin((t - 0.3) * Math.PI * 4) * 150;
        return 180 - (t - 0.6) * 200;
    }
    return 480;
}

function update() {
    if (!gameRunning) return;
    
    let b = getBiome(currentLevel);
    
    if (currentLevel === 100) {
        player.vy += 0.5;
        player.vx *= 0.98;
        player.x += player.vx;
        player.y += player.vy;
        player.angle += player.vx * 0.15;
        
        if (player.x < player.r) player.x = player.r;
        if (player.x > 1000 - player.r) player.x = 1000 - player.r;
        
        if (player.x > 450 && player.y + player.r > 180 && player.y - player.r < 220) {
            loadLevel(101);
        }
        
        if (player.y > 500) {
            deaths++;
            loadLevel(100);
        }
        
        document.getElementById("deathCount").innerText = deaths;
        return;
    }
    
    if(b.isAssas) { spriteTimer++; if(spriteTimer % 5 === 0) spriteFrame = (spriteFrame + 1) % 8; }

    if (keys[39]) player.vx += 0.65;
    if (keys[37]) player.vx -= 0.65;
    
    player.angle += player.vx * 0.12;
    if (!player.grounded && Math.abs(player.vy) > 3) {
        player.angle += (player.vy > 0 ? 0.08 : -0.08);
    }
    if (player.angle > Math.PI * 2) player.angle -= Math.PI * 2;
    if (player.angle < 0) player.angle += Math.PI * 2;
    
    if (b.isMountain) {
        let groundY = getMountainHeight(player.x, currentLevel);
        
        player.vy += b.grav;
        player.x += player.vx;
        player.y += player.vy;
        
        if (player.y + player.r > groundY) {
            player.grounded = true;
            player.canDoubleJump = true;
            player.vy = 0;
            player.y = groundY - player.r;
            player.vx *= 0.96;
            player.x = Math.max(player.r, Math.min(mountainWidth - player.r, player.x));
        } else {
            player.grounded = false;
        }
        
        let maxSpeed = 11;
        player.vx = Math.min(Math.max(player.vx, -maxSpeed), maxSpeed);
        
        cameraX = player.x - canvas.width / 2;
        cameraX = Math.max(0, Math.min(mountainWidth - canvas.width, cameraX));
        
        if (player.x > mountainWidth - 100 && player.y + player.r > getMountainHeight(mountainWidth - 80, currentLevel) - 15) {
            if (Math.abs(player.x - (mountainWidth - 80)) < 80) {
                loadLevel(currentLevel + 1);
            }
        }
        
        if (player.y > 550) {
            deaths++;
            loadLevel(currentLevel);
        }
    } else {
        player.vy += b.grav; 
        player.vx *= 0.95; 
        player.x += player.vx; 
        player.y += player.vy;

        if (player.x < player.r) player.x = player.r;
        if (player.x > 1000 - player.r) player.x = 1000 - player.r;
    }

    let timeDiff = Date.now() - startTime;
    let mins = Math.floor(timeDiff / 60000).toString().padStart(2, '0');
    let secs = Math.floor((timeDiff % 60000) / 1000).toString().padStart(2, '0');
    let msecs = Math.floor((timeDiff % 1000) / 10).toString().padStart(2, '0');
    document.getElementById("timer").innerText = mins+":"+secs+":"+msecs;

    for (let i = bullets.length - 1; i >= 0; i--) {
        let bu = bullets[i]; bu.x += bu.vx; bu.y += bu.vy;
        if(b.lava && bu.y > 480) {
            platforms.push({x: bu.x - 35, y: 480, w: 70, h: 20, c: '#add8e6', t: '#fff', type: 'ice'});
            bullets.splice(i, 1); continue;
        }
        if (bu.x < 0 || bu.x > 1000 || bu.y < 0 || bu.y > 500) bullets.splice(i, 1);
    }

    lasers.forEach(l => {
        l.angle += l.rotSpeed;
        let x2 = l.x + Math.cos(l.angle) * l.len;
        let y2 = l.y + Math.sin(l.angle) * l.len;
        let dist = distToSegment({x: player.x, y: player.y}, {x: l.x, y: l.y}, {x: x2, y: y2});
        
        if (dist < player.r - 3) { 
            deaths++; 
            loadLevel(currentLevel); 
        }
    });

    if (!b.isMountain) {
        player.grounded = false;
        platforms.forEach(p => {
            if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 45) loadLevel(currentLevel + 1);
            if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
                if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
                if (player.vy > 0 && player.y < p.y + 15) { 
                    player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = p.y - player.r; 
                }
            }
        });
    }

    if (b.lava && player.y > 480) { deaths++; loadLevel(currentLevel); }
    if (player.y > 600 || player.y < -150) { deaths++; loadLevel(currentLevel); }
    document.getElementById("deathCount").innerText = deaths;
}

function distToSegment(p, v, w) {
    let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (currentLevel === 100) {
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < 50; i++) {
            ctx.fillStyle = `hsl(${Date.now() + i * 100}, 100%, 50%)`;
            ctx.fillRect((i * 20 + Date.now() * 0.01) % canvas.width, (i * 10) % canvas.height, 5, 5);
        }
        
        ctx.fillStyle = "#FFA500";
        ctx.fillRect(0, 300, canvas.width, 200);
        
        ctx.font = "bold 36px Arial";
        ctx.fillStyle = "#FFF";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "black";
        ctx.fillText("✨ FASE FINAL! ✨", canvas.width/2 - 150, 80);
        ctx.font = "20px Arial";
        ctx.fillText("Vá até o portal dourado!", canvas.width/2 - 130, 140);
        
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(450, 200, 100, 50);
        ctx.fillStyle = "#FFA500";
        ctx.fillRect(470, 210, 60, 30);
        ctx.font = "16px Arial";
        ctx.fillStyle = "#FFF";
        ctx.fillText("GOAL", 485, 240);
        ctx.shadowBlur = 0;
    }
    
    if (b.isMountain) {
        const skyColors = {
            33: ["#1a2a3a", "#2a3a4a"],
            34: ["#2a1a2a", "#3a2a3a"],
            35: ["#1a3a2a", "#2a4a3a"],
            36: ["#3a2a1a", "#4a3a2a"],
            37: ["#2a1a3a", "#3a2a4a"],
            38: ["#1a2a2a", "#2a3a3a"],
            39: ["#3a1a2a", "#4a2a3a"],
            40: ["#0a0f1a", "#1a1f2a"]
        };
        let colors = skyColors[currentLevel] || ["#0A0F1A", "#1A1F2A"];
        let grad = ctx.createLinearGradient(0, 0, 0, 500);
        grad.addColorStop(0, colors[0]);
        grad.addColorStop(1, colors[1]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(-cameraX, 0);
        
        ctx.beginPath();
        ctx.moveTo(0, getMountainHeight(0, currentLevel));
        for (let x = 0; x <= mountainWidth; x += 8) {
            let y = getMountainHeight(x, currentLevel);
            ctx.lineTo(x, y);
        }
        ctx.lineTo(mountainWidth, 500);
        ctx.lineTo(0, 500);
        ctx.closePath();
        
        let groundGrad = ctx.createLinearGradient(0, 400, 0, 100);
        groundGrad.addColorStop(0, "#2C1810");
        groundGrad.addColorStop(0.5, "#4A2A1A");
        groundGrad.addColorStop(1, "#6B3E1A");
        ctx.fillStyle = groundGrad;
        ctx.fill();
        
        ctx.strokeStyle = "#CD853F";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        
        ctx.font = "bold 24px monospace";
        ctx.fillStyle = "#FFD700";
        ctx.shadowBlur = 5;
        ctx.fillText(`FASE ${currentLevel}`, cameraX + 20, 50);
        ctx.font = "14px monospace";
        ctx.fillStyle = "#FFF";
        const phaseNames = {
            33: "⬆️ VERTICAL",
            34: "🌀 ZIGZAG",
            35: "☁️ PLATAFORMAS",
            36: "🕳️ CAVERNA",
            37: "🌀 ESPIRAL",
            38: "⬇️ INVERSO",
            39: "💥 CAOS",
            40: "👑 FINAL"
        };
        ctx.fillText(phaseNames[currentLevel] || "MONTANHA", cameraX + 20, 80);
        ctx.fillStyle = "#AAA";
        ctx.font = "12px monospace";
        ctx.fillText("←  USE AS SETAS PARA MOVER  →", cameraX + 20, 110);
        ctx.shadowBlur = 0;
        
        let goalX = mountainWidth - 80;
        let goalY = getMountainHeight(goalX, currentLevel);
        
        ctx.fillStyle = "#fff";
        ctx.fillRect(goalX - 2, goalY - 45, 4, 45);
        
        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.moveTo(goalX, goalY - 50);
        ctx.lineTo(goalX + 25, goalY - 60);
        ctx.lineTo(goalX, goalY - 70);
        ctx.fill();
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = "gold";
        ctx.fillStyle = "rgba(255, 215, 0, 0.4)";
        ctx.beginPath();
        ctx.arc(goalX, goalY - 60, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.restore();
        
        let progress = (player.x / mountainWidth) * 100;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(10, 10, 200, 15);
        ctx.fillStyle = "#ffd700";
        ctx.fillRect(10, 10, progress * 2, 15);
        ctx.fillStyle = "white";
        ctx.font = "12px monospace";
        ctx.fillText(`PROGRESSO: ${Math.floor(progress)}%`, 10, 28);
        
    } else if (currentLevel !== 100) {
        ctx.fillStyle = b.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if(b.lava) { ctx.fillStyle = "#ff4500"; ctx.fillRect(0, 480, canvas.width, 20); }
        
        lasers.forEach(l => {
            ctx.save();
            ctx.translate(l.x, l.y);
            ctx.rotate(l.angle);
            ctx.strokeStyle = "#ff3366";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff0000";
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(l.len, 0);
            ctx.stroke();
            ctx.fillStyle = "#ff6699";
            ctx.beginPath();
            ctx.arc(l.len, 0, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        
        platforms.forEach(p => {
            if(p.type === 'goal') {
                ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
            } else {
                ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4);
            }
        });
        
        bullets.forEach(bu => { ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(bu.x, bu.y, 6, 0, Math.PI * 2); ctx.fill(); });
    }
    
    // Renderização do jogador com escala proporcional para os sprites do Assas
    ctx.save();
    if (b.isMountain) {
        ctx.translate(player.x - cameraX, player.y);
    } else {
        ctx.translate(player.x, player.y);
    }
    
    if(b.isAssas) {
        // Usa os dados de escala calculados com base nas dimensões reais da imagem
        const data = assasSpriteData[spriteFrame];
        if (data) {
            const scale = data.scale;
            const w = data.w * scale;
            const h = data.h * scale;
            ctx.drawImage(assasSprites[spriteFrame], -w/2, -h/2, w, h);
        } else {
            // Fallback enquanto não carregou
            ctx.drawImage(assasSprites[spriteFrame], -player.r, -player.r, player.r*2, player.r*2);
        }
    } else {
        ctx.rotate(player.angle);
        ctx.drawImage(ballImg, -player.r, -player.r, player.r * 2, player.r * 2);
    }
    ctx.restore();

    if(b.hasGun && !b.isMountain && currentLevel !== 100) {
        ctx.save(); 
        ctx.translate(player.x, player.y);
        let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        ctx.rotate(angle); 
        ctx.drawImage(gunImg, 10, -10, 30, 20);
        ctx.restore();
    }
}

function gameLoop() { 
    if (gameRunning) {
        update(); 
        draw(); 
    }
    requestAnimationFrame(gameLoop); 
}

window.addEventListener("keydown", e => {
    if (!gameRunning) return;
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        let b = getBiome(currentLevel);
        if (b.flappy) { player.vy = -7; } 
        else {
            if (player.grounded) { 
                let jumpForce = -12;
                player.vy = jumpForce; 
                player.grounded = false;
                player.angle += 0.3;
            }
            else if (player.canDoubleJump) { 
                player.vy = -10; 
                player.canDoubleJump = false;
                player.angle += 0.5;
            }
        }
    }
    if (e.keyCode === 82) platforms = platforms.filter(p => p.type !== 'ice');
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);

window.addEventListener('mousedown', () => {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if(!b.hasGun || b.isMountain || currentLevel === 100) return;
    let a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*15, vy: Math.sin(a)*15});
});

canvas.addEventListener('mousemove', e => { 
    let r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; 
});
</script>
