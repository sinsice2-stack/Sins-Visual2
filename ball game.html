<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; display: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; display: none; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 

const assasSprites = [];
for (let i = 1; i <= 8; i++) {
    const img = new Image();
    img.src = `bola-amarela-assas${i.toString().padStart(4, '0')}.webp`;
    assasSprites.push(img);
}

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [];
let player = { x: 60, y: 300, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let camX = 0, camY = 0, spriteFrame = 0, spriteTimer = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; startTime = Date.now(); loadLevel(1); gameLoop();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", lava: true, grav: 0.8 };
    if (n === 33) return { bg: "#4a5b6d", grav: 0.95, isMountain: true }; 
    if (n <= 50) return { bg: "#001a33", water: true, grav: 0.2 }; 
    if (n <= 70) return { bg: "#050505", laser: true, grav: 0.85, isAssasino: true }; 
    return { bg: "#000011", space: true, grav: 0.05 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const b = getBiome(n);
    const lv = [];
    if (b.isMountain) {
        let curX = 120, curY = 400;
        lv.push({x: 0, y: 400, w: 120, h: 500, c: "#1a252c", t: "#fff", type: 'normal'});
        lv.push({ x1: curX, y1: curY, x2: curX + 1000, y2: curY - 600, type: 'slope' });
        lv.push({ x: curX + 1000, y: curY - 600, w: 400, h: 1000, c: "#1a252c", t: "#ffffff", type: 'normal' });
        lv.push({ x: curX + 1200, y: curY - 600, type: 'goal' });
    } else {
        lv.push({x: 0, y: 400, w: 120, h: 500, c: b.g || "#555", t: b.t || "#777", type: 'normal'});
        let lx = 120, ly = 400;
        while (lx < 850) {
            lx += 110 + (random()*80); ly += (random()*120)-60;
            if (ly < 150) ly = 150; if (ly > 440) ly = 400;
            let type = (b.lava || b.laser) && random() > 0.6 ? 'spike' : 'normal';
            lv.push({x: lx, y: ly, w: 70, h: 25, c: type==='spike'?'#f00':(b.g||"#555"), t: type==='spike'?'#f00':(b.t||"#777"), type: type});
        }
        lv.push({x: 930, y: ly, w: 70, h: 500, c: b.g || "#444", t: b.t || "#666", type: 'normal'});
        lv.push({x: 960, y: ly, type: 'goal'});
    }
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 60; player.y = 300; player.vx = player.vy = 0; 
    camX = 0; camY = 0; document.getElementById("lvlNum").innerText = n; 
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if(b.isAssasino) { spriteTimer++; if(spriteTimer % 5 === 0) spriteFrame = (spriteFrame + 1) % 8; }

    if (keys[39]) player.vx += 0.8; if (keys[37]) player.vx -= 0.8;
    player.vy += b.grav; player.vx *= 0.95; player.x += player.vx; player.y += player.vy;
    player.angle += player.vx * 0.1;

    if(currentLevel === 33) {
        camX += (player.x - 500 - camX) * 0.1; camY += (player.y - 300 - camY) * 0.1;
    } else { camX = 0; camY = 0; }

    if (player.x - player.r < camX) { player.x = camX + player.r; player.vx = 0; }
    if (currentLevel !== 33 && player.x + player.r > 1000) { player.x = 1000 - player.r; player.vx = 0; }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let bu = bullets[i]; bu.x += bu.vx; bu.y += bu.vy;
        if(b.lava && bu.y > 475) {
            platforms.push({x: bu.x - 40, y: 475, w: 80, h: 25, c: '#add8e6', t: '#fff', type: 'normal'});
            bullets.splice(i, 1); continue;
        }
        let hit = false;
        platforms.forEach(p => { if (p.type !== 'goal' && bu.x > p.x && bu.x < p.x + p.w && bu.y > p.y && bu.y < p.y + p.h) hit = true; });
        if (hit || bu.x < camX - 100 || bu.x > camX + 1100) bullets.splice(i, 1);
    }

    player.grounded = false;
    platforms.forEach(p => {
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 50) loadLevel(currentLevel + 1);
        if (p.type === 'slope' && player.x >= p.x1 && player.x <= p.x2) {
            let pct = (player.x - p.x1) / (p.x2 - p.x1);
            let rampY = p.y1 + pct * (p.y2 - p.y1);
            if (player.y + player.r > rampY) { player.y = rampY - player.r; player.vy = 0; player.grounded = true; player.canDoubleJump = true; }
        } else if (p.type !== 'goal' && player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
            if (player.vy > 0 && player.y < p.y + 15) { player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = p.y - player.r; }
            else { player.vx *= -0.5; }
        }
    });

    if (b.lava && player.y > 480) { deaths++; loadLevel(currentLevel); }
    if (player.y > camY + 800) { deaths++; loadLevel(currentLevel); }
    
    let timeDiff = Date.now() - startTime;
    document.getElementById("timer").innerText = `${Math.floor(timeDiff/60000).toString().padStart(2,'0')}:${Math.floor((timeDiff%60000)/1000).toString().padStart(2,'0')}:${Math.floor((timeDiff%1000)/10).toString().padStart(2,'0')}`;
    document.getElementById("deathCount").innerText = deaths;
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.fillStyle = b.bg; ctx.fillRect(0, 0, 1000, 500);
    if(b.lava) { ctx.fillStyle = "#ff4500"; ctx.fillRect(0, 480, 1000, 20); }

    ctx.save(); ctx.translate(-camX, -camY);
    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else if (p.type === 'slope') {
            ctx.fillStyle = "#1a252c"; ctx.beginPath(); ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2); ctx.lineTo(p.x2, p.y2 + 1000); ctx.lineTo(p.x1, p.y1 + 1000); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2); ctx.stroke();
        } else {
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4);
        }
    });

    bullets.forEach(bu => { ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(bu.x, bu.y, 6, 0, Math.PI * 2); ctx.fill(); });

    ctx.save(); ctx.translate(player.x, player.y); 
    if(b.isAssasino) {
        // --- SPRITE "ENGORDADO" ---
        // Largura = player.r * 3.2 (60% maior que a bola normal)
        // Altura = player.r * 2 (Mantém a altura da bola)
        ctx.drawImage(assasSprites[spriteFrame], -player.r * 1.6, -player.r, player.r * 3.2, player.r * 2);
    } else {
        ctx.rotate(player.angle);
        ctx.drawImage(ballImg, -player.r, -player.r, player.r * 2, player.r * 2);
    }
    ctx.restore();

    if (currentLevel >= 21 && !b.isAssasino) {
        let a = Math.atan2((mouse.y + camY) - player.y, (mouse.x + camX) - player.x);
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(a);
        ctx.drawImage(gunImg, 15, -12, 40, 25); ctx.restore();
    }
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        let b = getBiome(currentLevel);
        if (b.isAssasino) { player.vy = -8.5; player.grounded = false; }
        else if (player.grounded) { player.vy = -13; player.grounded = false; }
        else if (player.canDoubleJump) { player.vy = -11; player.canDoubleJump = false; }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);
window.addEventListener('mousedown', () => {
    let b = getBiome(currentLevel);
    if(!gameRunning || currentLevel < 21 || b.isAssasino) return;
    let a = Math.atan2((mouse.y + camY) - player.y, (mouse.x + camX) - player.x);
    bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*18, vy: Math.sin(a)*18});
});
canvas.addEventListener('mousemove', e => { 
    let r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; 
});
</script>
</body>
</html>
