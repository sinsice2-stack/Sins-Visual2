<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Definitive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">
        <span>PLAYER: <b>SINSICE</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 

let currentLevel = 1, deaths = 0, startTime = Date.now();
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [];
let player = { x: 60, y: 350, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let camY = 0;

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    return { bg: "#576d85", grav: 0.9, isMountain: true }; 
}

function generateLevel(n) {
    const biome = getBiome(n);
    const lv = [];
    
    // Início
    lv.push({x: 0, y: 400, w: 120, h: 500, c: "#555", t: "#777", type: 'normal'});
    
    if (biome.isMountain) {
        let curX = 120, curY = 400;
        // Subida da Rampa
        for(let i = 0; i < 30; i++) {
            curX += 20; curY -= 10;
            lv.push({ x: curX, y: curY, w: 25, h: 600, type: 'mountain_rock' });
        }
        // Topo e Bandeira (Exatamente como no seu código)
        lv.push({ x: curX, y: curY, w: 100, h: 600, type: 'mountain_rock' });
        lv.push({ x: curX + 40, y: curY, type: 'goal' }); // Sua bandeira aqui
    } else {
        lv.push({x: 920, y: 350, w: 80, h: 500, c: "#444", t: "#666", type: 'normal'});
        lv.push({x: 950, y: 350, type: 'goal'});
    }
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 40; player.y = 350; player.vx = player.vy = 0; 
    document.getElementById("lvlNum").innerText = n; 
}

function update() {
    let b = getBiome(currentLevel);
    if (keys[39]) player.vx += 0.8; if (keys[37]) player.vx -= 0.8;
    player.vy += b.grav;
    player.vx *= 0.95;
    player.x += player.vx; player.y += player.vy;
    player.angle += player.vx * 0.1;

    if(b.isMountain) {
        let targetCam = player.y - 250;
        camY += (targetCam - camY) * 0.1;
    } else { camY = 0; }

    // Cronômetro Milissegundos
    let timeDiff = Date.now() - startTime;
    let mins = Math.floor(timeDiff / 60000).toString().padStart(2, '0');
    let secs = Math.floor((timeDiff % 60000) / 1000).toString().padStart(2, '0');
    let ms = Math.floor((timeDiff % 1000) / 10).toString().padStart(2, '0');
    document.getElementById("timer").innerText = `${mins}:${secs}:${ms}`;

    player.grounded = false;
    platforms.forEach(p => {
        // Colisão com a bandeira (Exatamente 50px de distância como no seu original)
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 50) loadLevel(currentLevel + 1);
        
        if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (player.vy > 0 && player.y < p.y + 20) { 
                player.grounded = true; player.canDoubleJump = true; 
                player.vy = 0; player.y = p.y - player.r; 
            } else { player.vx *= -0.5; }
        }
    });

    if (player.y > camY + 1000) { deaths++; loadLevel(currentLevel); }
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.save();
    ctx.translate(0, -camY);

    ctx.fillStyle = b.bg; ctx.fillRect(-500, camY - 500, 2000, 2000);

    platforms.forEach(p => {
        if(p.type === 'goal') {
            // DESENHO DA BANDEIRA - ORIGINAL DO SEU CÓDIGO
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); 
            ctx.moveTo(p.x, p.y-70); 
            ctx.lineTo(p.x+40, p.y-50); 
            ctx.lineTo(p.x, p.y-30); 
            ctx.fill();
        } else {
            ctx.fillStyle = p.c || "#444"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = p.t || "#666"; ctx.fillRect(p.x, p.y, p.w, 4);
        }
    });

    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.drawImage(ballImg, -player.r, -player.r, player.r*2, player.r*2); ctx.restore();

    ctx.restore();
    document.getElementById("deathCount").innerText = deaths;
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        if (player.grounded) { player.vy = -13; player.grounded = false; }
        else if (player.canDoubleJump) { player.vy = -11; player.canDoubleJump = false; }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);

loadLevel(1); 
gameLoop();
</script>
</body>
</html>
