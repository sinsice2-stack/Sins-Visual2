<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Mountain Real</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; display: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; display: none; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 

let currentLevel = 1, deaths = 0, startTime = 0, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [];
let player = { x: 60, y: 350, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let camY = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; startTime = Date.now(); loadLevel(1); gameLoop();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", lava: true, grav: 0.8 };
    if (n <= 50) return { bg: "#4a5b6d", grav: 0.9, isMountain: true }; 
    if (n <= 70) return { bg: "#001a33", water: true, grav: 0.15 };
    return { bg: "#2ecc71", g: "#4d2600", t: "#27ae60", grav: 0.8 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const biome = getBiome(n);
    const lv = [];
    
    // Início
    lv.push({x: 0, y: 400, w: 150, h: 400, c: biome.g || "#444", t: biome.t || "#666", type: 'normal'});
    
    if (biome.isMountain) {
        let curX = 150, curY = 400;
        // SUBIDA (Densa)
        for(let i = 0; i < 40; i++) {
            curX += 30; // Avanço curto para ficar denso
            curY -= 25 + (random() * 15); // Sobe inclinado
            lv.push({ x: curX, y: curY, w: 100, h: 400, type: 'rock3d' });
        }
        // CUME (Pequena reta)
        for(let i = 0; i < 5; i++) {
            curX += 60;
            lv.push({ x: curX, y: curY, w: 100, h: 400, type: 'rock3d' });
        }
        // DESCIDA (Densa)
        for(let i = 0; i < 40; i++) {
            curX += 40;
            curY += 25 + (random() * 20); // Desce inclinado
            lv.push({ x: curX, y: curY, w: 100, h: 400, type: 'rock3d' });
        }
        // APOIO FINAL DA BANDEIRA
        lv.push({ x: curX, y: curY, w: 250, h: 400, type: 'rock3d' });
        lv.push({ x: curX + 100, y: curY, type: 'goal' });

    } else {
        let lastX = 150, lastY = 400;
        while (lastX < 850) {
            let gapX = 130 + (random() * 70);
            let gapY = (random() * 140) - 70;
            lastX += gapX; lastY += gapY;
            if (lastY < 150) lastY = 200; if (lastY > 440) lastY = 400;
            let isSpike = (biome.lava && random() > 0.5);
            lv.push({x: lastX, y: lastY, w: 85, h: 25, c: isSpike?'#f00':(biome.g||"#555"), t: isSpike?'#f00':(biome.t||"#777"), type: isSpike?'spike':'normal'});
            lastX += 85;
        }
        lv.push({x: 950, y: lastY, type: 'goal'});
    }
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 60; player.y = 350; player.vx = player.vy = 0; 
    camY = 0; 
    document.getElementById("lvlNum").innerText = n; 
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if (keys[39]) player.vx += 0.8; if (keys[37]) player.vx -= 0.8;
    player.vy += b.grav; player.vx *= 0.95;
    player.x += player.vx; player.y += player.vy;
    player.angle += player.vx * 0.1;

    if(b.isMountain) { camY += ((player.y - 250) - camY) * 0.15; } else { camY = 0; }

    // Cronômetro Turbo
    let diff = Date.now() - startTime;
    let mins = Math.floor(diff / 60000).toString().padStart(2, '0');
    let secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
    let ms = Math.floor((diff % 1000) / 10).toString().padStart(2, '0');
    document.getElementById("timer").innerText = `${mins}:${secs}:${ms}`;

    player.grounded = false;
    platforms.forEach(p => {
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 50) loadLevel(currentLevel + 1);
        if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
            if (player.vy > 0 && player.y < p.y + 20) { 
                player.grounded = true; player.canDoubleJump = true; 
                player.vy = 0; player.y = p.y - player.r; 
            } else { player.vx *= -0.5; }
        }
    });

    if (b.lava && player.y > 475) { deaths++; loadLevel(currentLevel); }
    if (player.y > camY + 900) { deaths++; loadLevel(currentLevel); }
    if (player.x < player.r) { player.x = player.r; player.vx = 0; }
    if (player.x > 5000) { player.vx = 0; } // Permite andar mais na montanha
    document.getElementById("deathCount").innerText = deaths;
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.save(); ctx.translate(0, -camY);

    // Ajuste de horizonte infinito para a montanha
    ctx.fillStyle = b.bg; ctx.fillRect(-2000, camY, 8000, 500);
    if(b.lava) { ctx.fillStyle = "#ff4500"; ctx.fillRect(0, 475, 1000, 300); }

    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else if (p.type === 'rock3d') {
            // Relevo de Pedra
            ctx.fillStyle = "#333"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#555"; ctx.fillRect(p.x, p.y, p.w, 10); // Topo da pedra
            ctx.strokeStyle = "#222"; ctx.strokeRect(p.x, p.y, p.w, p.h);
        } else {
            ctx.fillStyle = p.c || "#555"; ctx.fillRect(p.x, p.y, p.w, p.h);
            if(p.t) { ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4); }
        }
    });

    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.drawImage(ballImg, -player.r, -player.r, player.r*2, player.r*2); ctx.restore();

    if (currentLevel >= 21) {
        let a = Math.atan2((mouse.y + camY) - player.y, mouse.x - player.x);
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(a);
        ctx.drawImage(gunImg, 15, -12, 40, 25); ctx.restore();
    }
    
    bullets.forEach(bu => {
        bu.x += bu.vx; bu.y += bu.vy;
        ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(bu.x, bu.y, 6, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        if (player.grounded) { player.vy = -13; player.grounded = false; }
        else if (player.canDoubleJump) { player.vy = -11; player.canDoubleJump = false; }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);
window.addEventListener('mousedown', () => {
    if(!gameRunning || currentLevel < 21) return;
    let a = Math.atan2((mouse.y + camY) - player.y, mouse.x - player.x);
    bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*15, vy: Math.sin(a)*15});
});
canvas.addEventListener('mousemove', e => { 
    let r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; 
});
</script>
</body>
</html>
