<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Ball - Sinsice Extreme</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 2px solid #555; box-shadow: 0 0 60px rgba(0,0,0,0.9); cursor: crosshair; display: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .menu-btn:hover { background: #fff; transform: scale(1.1); color: #000; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 20px; text-align: center; width: 250px; }
        .hud { color: white; position: absolute; top: 20px; font-size: 18px; width: 100%; pointer-events: none; display: flex; justify-content: space-around; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; display: none; }
        b { color: #00fbff; font-size: 24px; }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">
        <span>PLAYER: <b id="displayName">---</b></span>
        <span>FASE <b id="lvlNum">1</b></span>
        <span>⏱️ <b id="timer">00:00:00</b></span>
        <span>MORTES <b id="deathCount">0</b></span>
    </div>

    <div id="startMenu" class="overlay">
        <h1>SUPER BALL 100</h1>
        <input type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="15">
        <button class="menu-btn" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000; canvas.height = 500;

const ballImg = new Image(); ballImg.src = 'bola amarela.webp'; 
const gunImg = new Image(); gunImg.src = 'arma-de-gelo.webp'; 

let currentLevel = 1, deaths = 0, startTime, gameRunning = false;
let keys = {}, mouse = { x: 0, y: 0 }, platforms = [], bullets = [];
let player = { x: 60, y: 350, r: 18, vx: 0, vy: 0, angle: 0, grounded: false, canDoubleJump: true };
let camY = 0;

function startGame() {
    const input = document.getElementById("playerNameInput").value.trim();
    if (input === "") return;
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("gameHud").style.display = "flex";
    document.getElementById("displayName").innerText = input.toUpperCase();
    canvas.style.display = "block";
    gameRunning = true; startTime = Date.now(); loadLevel(1); gameLoop();
}

let rngSeed = 1;
function random() { rngSeed = (rngSeed * 9301 + 49297) % 233280; return rngSeed / 233280; }

function getBiome(n) {
    if (n <= 10) return { bg: "#87ceeb", g: "#5d4037", t: "#2ecc71", grav: 0.8 };
    if (n <= 20) return { bg: "#f0f8ff", g: "#b0c4de", t: "#ffffff", grav: 0.8 };
    if (n <= 32) return { bg: "#2a0000", lava: true, grav: 0.8 };
    if (n <= 50) return { bg: "#7491b5", grav: 0.9, isMountain: true }; 
    if (n <= 70) return { bg: "#001a33", water: true, grav: 0.15 };
    if (n <= 80) return { bg: "#050505", laser: true, grav: 0.85 };
    if (n <= 95) return { bg: "#000011", space: true, grav: 0.05 };
    return { bg: "#2ecc71", g: "#4d2600", t: "#27ae60", grav: 0.8 };
}

function generateLevel(n) {
    rngSeed = n * 54321;
    const biome = getBiome(n);
    const lv = [];
    
    if (biome.isMountain) {
        lv.push({x: 0, y: 400, w: 250, h: 600, c: "#555", t: "#777", type: 'normal'});
        let mX = 250, mY = 400;
        for(let i = 0; i < 45; i++) {
            mX += 80 + (random() * 20);
            mY -= 130 + (random() * 30);
            // Rochas irregulares (em vez de blocos)
            lv.push({x: mX, y: mY, w: 40 + (random()*20), h: 30, type: 'rock'});
        }
        lv.push({x: mX + 50, y: mY - 80, type: 'goal'});
    } else {
        lv.push({x: 0, y: 400, w: 100, h: 100, c: biome.g || "#555", t: biome.t || "#777", type: 'normal'});
        let lastX = 100, lastY = 400;
        if (!biome.water) {
            while (lastX < 850) {
                let gapX = biome.space ? 180 : 120 + (random() * 80);
                let gapY = (random() * 140) - 70;
                let width = biome.laser ? 45 : 60 + (random() * 40);
                lastX += gapX; lastY += gapY;
                if (lastY < 120) lastY = 150; if (lastY > 440) lastY = 400;
                if (lastX > 880) break;
                let type = (biome.laser || biome.lava) && random() > 0.5 ? 'spike' : 'normal';
                lv.push({x: lastX, y: lastY, w: width, h: 25, c: type==='spike'?'#f00':(biome.g||"#555"), t: type==='spike'?'#f00':(biome.t||"#777"), type: type});
                lastX += width;
            }
        }
        lv.push({x: 920, y: biome.water ? 220 : lastY, w: 60, h: 300, c: biome.g || "#444", t: biome.t || "#666", type: 'normal'});
        lv.push({x: 950, y: biome.water ? 220 : lastY, type: 'goal'});
    }
    return lv;
}

function loadLevel(n) { 
    currentLevel = n; bullets = []; platforms = generateLevel(n); 
    player.x = 40; player.y = 350; player.vx = player.vy = 0; 
    camY = 0; 
    document.getElementById("lvlNum").innerText = n; 
}

function update() {
    if (!gameRunning) return;
    let b = getBiome(currentLevel);
    if (keys[39]) player.vx += (b.space ? 0.4 : 1.0);
    if (keys[37]) player.vx -= (b.space ? 0.4 : 1.0);
    player.vy += b.grav;
    let f = b.water ? 0.94 : (b.space ? 0.98 : 0.95);
    player.vx *= f; player.vy *= (b.space || b.water ? f : 1);
    player.x += player.vx; player.y += player.vy;
    player.angle += player.vx * 0.1;

    if(b.isMountain) {
        let targetCam = player.y - 300;
        camY += (targetCam - camY) * 0.1;
        
        // --- COLISÃO COM A RAMPA DA MONTANHA ---
        // A rampa começa em x=250, y=400 e sobe 1.5 pixels para cada 1 pixel pro lado
        if (player.x > 250) {
            let slopeY = 400 - (player.x - 250) * 1.55; 
            if (player.y + player.r > slopeY) {
                player.y = slopeY - player.r;
                player.vy = 0;
                player.grounded = true;
                player.canDoubleJump = true;
                player.vx *= 0.9; // Atrito na subida
            }
        }
    } else { camY = 0; }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let bu = bullets[i];
        bu.x += bu.vx; bu.y += bu.vy;
        platforms.forEach(p => {
            if (bu.x > p.x && bu.x < p.x + p.w && bu.y > p.y && bu.y < p.y + p.h) {
                if (p.type === 'spike') { p.type = 'normal'; p.c = '#add8e6'; p.t = '#fff'; }
                bullets.splice(i, 1);
            }
        });
        if (bu.x < -200 || bu.x > 1200 || bu.y < camY - 1000 || bu.y > camY + 1000) bullets.splice(i, 1);
    }

    platforms.forEach(p => {
        if (p.type === 'goal' && Math.hypot(player.x - p.x, player.y - (p.y - 20)) < 45) loadLevel(currentLevel + 1);
        if (player.x + player.r > p.x && player.x - player.r < p.x + p.w && player.y + player.r > p.y && player.y - player.r < p.y + p.h) {
            if (p.type === 'spike') { deaths++; loadLevel(currentLevel); }
            if (player.vy > 0 && player.y < p.y + 15) { 
                player.grounded = true; player.canDoubleJump = true; player.vy = 0; player.y = p.y - player.r; 
            } else { player.vx *= -0.5; }
        }
    });

    if (b.lava && player.y > 465) { deaths++; loadLevel(currentLevel); }
    if (player.y > camY + 600) { deaths++; loadLevel(currentLevel); }
    if (player.x < 0) player.x = 0; if (player.x > 1000) player.x = 1000;
    
    document.getElementById("timer").innerText = new Date(Date.now() - startTime).toISOString().substr(14, 8);
    document.getElementById("deathCount").innerText = deaths;
}

function draw() {
    let b = getBiome(currentLevel);
    ctx.clearRect(0, 0, 1000, 500);
    ctx.save();
    ctx.translate(0, -camY);

    ctx.fillStyle = b.bg; ctx.fillRect(0, camY, 1000, 500);

    if(b.isMountain) {
        ctx.fillStyle = "#666"; // Rocha sólida
        ctx.beginPath();
        ctx.moveTo(250, 400); 
        ctx.lineTo(8000, -11612); // Inclinação compatível com a colisão
        ctx.lineTo(8000, 8000);
        ctx.lineTo(250, 8000);
        ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 5; ctx.stroke();
    }
    
    if(b.lava) { ctx.fillStyle = "#ff4500"; ctx.fillRect(0, 475, 1000, 25); }

    platforms.forEach(p => {
        if(p.type === 'goal') {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x-2, p.y-70, 4, 70);
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(p.x, p.y-70); ctx.lineTo(p.x+40, p.y-50); ctx.lineTo(p.x, p.y-30); ctx.fill();
        } else if (p.type === 'rock') {
            // Desenha rochas irregulares cinzas
            ctx.fillStyle = "#444";
            ctx.beginPath();
            ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/1.8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#222"; // Sombra da rocha
            ctx.fillRect(p.x, p.y + p.h - 5, p.w, 5);
        } else {
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
            if(!b.isMountain) { ctx.fillStyle = p.t; ctx.fillRect(p.x, p.y, p.w, 4); }
        }
    });

    bullets.forEach(bu => {
        ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(bu.x, bu.y, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
    });

    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.drawImage(ballImg, -player.r, -player.r, player.r*2, player.r*2); ctx.restore();

    if (currentLevel >= 21) {
        let a = Math.atan2((mouse.y + camY) - player.y, mouse.x - player.x);
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(a);
        ctx.drawImage(gunImg, 15, -12, 40, 25); ctx.restore();
    }
    
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

window.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 32) {
        let b = getBiome(currentLevel);
        if (player.grounded || b.water || b.space) {
            player.vy = b.water ? -6 : (b.space ? -4 : -13);
            player.grounded = false;
        } else if (player.canDoubleJump) {
            player.vy = -11; player.canDoubleJump = false;
        }
    }
});
window.addEventListener("keyup", e => keys[e.keyCode] = false);

window.addEventListener('mousedown', () => {
    if(!gameRunning || currentLevel < 21) return;
    let a = Math.atan2((mouse.y + camY) - player.y, mouse.x - player.x);
    bullets.push({x: player.x, y: player.y, vx: Math.cos(a)*15, vy: Math.sin(a)*15});
});

canvas.addEventListener('mousemove', e => { 
    let r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; 
});
</script>
</body>
</html>
