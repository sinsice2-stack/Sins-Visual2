<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sins Ice2 - Portfólio</title>
    <style>
        /* TRAVAS DE SEGURANÇA E GERAL */
        * { -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: url('fundosite.webp') no-repeat center top fixed;
            background-size: 125%;
            color: #bc13fe; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        }

        .header-logo { max-width: 350px; margin: 0 auto 15px auto; cursor: pointer; }
        .header-logo img { width: 100%; height: auto; display: block; }

        .subtitle {
            font-size: 1rem;
            color: #bc13fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.5);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .info-box {
            background: rgba(22, 22, 22, 0.85); 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h2 { 
            color: #bc13fe; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.7);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .gallery-item:hover { 
            transform: translateY(-10px) scale(1.03); 
            border-color: #bc13fe; 
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.5);
        }

        .new-game-glow {
            border: 1px solid #bc13fe !important;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(188, 19, 254, 0.4); }
            50% { box-shadow: 0 0 20px rgba(188, 19, 254, 0.8); }
            100% { box-shadow: 0 0 5px rgba(188, 19, 254, 0.4); }
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-caption {
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #lightbox img, #lightbox video {
            max-width: 90%;
            max-height: 90%;
            border: 2px solid #bc13fe;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
        }

        .actions { text-align: center; padding: 40px 0; }
        .btn-gif { display: inline-block; transition: transform 0.3s ease; max-width: 400px; cursor: pointer; }
        .btn-gif:hover { transform: scale(1.1); }
        .btn-gif img { width: 100%; height: auto; border-radius: 10px; }

        footer {
            text-align: center;
            padding: 40px;
            color: #bc13fe;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(188, 19, 254, 0.3);
        }

        /* ===== SISTEMA DE CONQUISTAS ESTILO FLASH 2010-2014 ===== */
        #achievement-toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            pointer-events: none;
        }

        .achievement-toast {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.6), inset 0 0 8px rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Arial Black', 'Impact', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            transform: translateX(120%);
            animation: slideInOut 5s ease-in-out forwards;
            min-width: 280px;
            border-image: repeating-linear-gradient(45deg, #bc13fe, #ff00ff, #bc13fe) 30;
            border-style: solid;
            border-width: 3px;
        }

        /* Cores da borda por raridade (mantemos o gradiente animado, mas variamos a cor base) */
        .achievement-toast.rarity-common {
            border-color: #a0a0a0;
            box-shadow: 0 0 20px rgba(160, 160, 160, 0.5), inset 0 0 8px rgba(255,255,255,0.1);
        }
        .achievement-toast.rarity-uncommon {
            border-color: #3a9b3a;
            box-shadow: 0 0 20px rgba(58, 155, 58, 0.7), inset 0 0 8px rgba(255,255,255,0.1);
        }
        .achievement-toast.rarity-rare {
            border-color: #bc13fe;
            box-shadow: 0 0 25px #bc13fe, inset 0 0 10px rgba(255,255,255,0.2);
            animation: slideInOut 5s ease-in-out forwards, rarePulse 1.5s infinite alternate;
        }

        @keyframes rarePulse {
            from { box-shadow: 0 0 20px #bc13fe, inset 0 0 8px rgba(255,255,255,0.2); }
            to { box-shadow: 0 0 35px #ff66ff, inset 0 0 12px rgba(255,255,255,0.3); }
        }

        /* Ícone de troféu estilizado (CSS puro, sem emojis) */
        .achievement-icon {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 30% 20%, #fff9c4, #ffb300);
            border-radius: 50% 50% 30% 30% / 40% 40% 20% 20%;
            position: relative;
            box-shadow: 0 0 15px currentColor;
            transform: rotate(-5deg);
        }
        .achievement-icon::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background: #b8860b;
            bottom: -6px;
            left: 14px;
            border-radius: 20% 20% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 0 0 8px #ffb300;
        }
        .achievement-icon::after {
            content: "★";
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 28px;
            color: #fff8e7;
            text-shadow: 0 0 10px #ffd700;
            transform: rotate(10deg);
        }

        .achievement-content {
            flex: 1;
        }

        .achievement-title {
            font-size: 18px;
            font-weight: 900;
            text-shadow: 0 0 8px currentColor;
            margin-bottom: 4px;
        }

        .achievement-description {
            font-size: 11px;
            color: #ddd;
            font-family: 'Segoe UI', sans-serif;
            text-transform: none;
            letter-spacing: 0.5px;
        }

        .achievement-score {
            font-size: 28px;
            font-weight: 900;
            color: #ffd966;
            text-shadow: 0 0 15px #ffaa00;
            margin-left: 5px;
            font-family: 'Impact', sans-serif;
        }
        .achievement-score span {
            font-size: 16px;
            color: #ccc;
            margin-right: 4px;
            text-shadow: none;
        }

        @keyframes slideInOut {
            0% { transform: translateX(120%); opacity: 0; }
            10% { transform: translateX(0); opacity: 1; }
            85% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(120%); opacity: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Áudios originais do site -->
    <audio id="click-sound" src="click.mp3" preload="auto"></audio>
    <audio id="select-sound" src="select.mp3" preload="auto"></audio>

    <!-- Áudios das conquistas -->
    <audio id="achievement-sound-common" src="conquista 1.mp3" preload="auto"></audio>
    <audio id="achievement-sound-uncommon" src="conquista 2.mp3" preload="auto"></audio>
    <audio id="achievement-sound-rare" src="conquista suprema.mp3" preload="auto"></audio>

    <header>
        <div class="header-logo" id="secret-logo">
            <img src="logo sinsice2 site.webp" alt="Sins Ice2 Logo">
        </div>
        <div class="subtitle">13 anos • YouTuber • Animador • Compositor • Designer</div>
    </header>

    <div class="container">
        
        <div class="info-box">
            <h2>Galeria de Projetos</h2>
            <div class="skills-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px;">
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎬 Animação</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎵 Composição</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎨 Arte Digital</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">✒️ Design</div>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item" onclick="playSelect(); openLightboxVideo('bixo de espada.mp4')">
                    <video autoplay loop muted playsinline>
                        <source src="bixo de espada.mp4" type="video/mp4">
                    </video>
                    <div class="gallery-caption">Minhas Animações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="soldado.webp" alt="Soldado Zoiudo">
                    <div class="gallery-caption">Ilustrações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="Design1.webp" alt="Meu Design">
                    <div class="gallery-caption">Assets & Design</div>
                </div>
            </div>
        </div>

        <div class="info-box">
            <h2>Meus Jogos</h2>
            <div class="gallery-grid">
                <div class="gallery-item new-game-glow" onclick="playSelect(); window.open('ball game.html', '_blank');">
                    <img src="thumb ball game.webp" alt="Thumbnail Ball Game">
                    <div class="gallery-caption">🟢 JOGAR BALL GAME</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="https://www.youtube.com/@Sinsice2" target="_blank" class="btn-gif" id="youtube-link">
                <img src="vireumgelo.gif" alt="Se inscreva no canal - Vire um Gelo">
            </a>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" style="display:none;">
        <video id="lightbox-video" controls loop style="display:none;"></video>
    </div>

    <!-- Container dos toasts -->
    <div id="achievement-toast-container"></div>

    <footer>
        <p>&copy; 2026 SINS ICE2 - Todos os direitos reservados.</p>
    </footer>

    <script>
        // ======================== SCRIPTS ORIGINAIS ========================
        const clickSound = document.getElementById('click-sound');
        const selectSound = document.getElementById('select-sound');

        function playSelect() {
            if (selectSound) {
                selectSound.currentTime = 0;
                selectSound.play().catch(e => console.log("Erro som"));
            }
        }

        document.body.addEventListener('click', function() {
            clickSound.load();
            selectSound.load();
        }, { once: true });

        // ======================== SISTEMA DE CONQUISTAS (ESTILO FLASH) ========================
        (function(){
            "use strict";

            // ----- Áudios -----
            const audioCommon = document.getElementById('achievement-sound-common');
            const audioUncommon = document.getElementById('achievement-sound-uncommon');
            const audioRare = document.getElementById('achievement-sound-rare');
            
            // ----- Configuração de raridade -----
            const RARITY = {
                COMMON:   { name: 'common',   sound: audioCommon,   points: 10 },
                UNCOMMON: { name: 'uncommon', sound: audioUncommon, points: 25 },
                RARE:     { name: 'rare',     sound: audioRare,     points: 50 }
            };

            // ----- Estado e fila -----
            let unlockedAchievements = {};          // desbloqueadas na sessão atual
            const STORAGE_KEY = 'sins_achievements_v2';
            
            let isQueueProcessing = false;
            const achievementQueue = [];
            let audioUnlocked = false;

            // ----- Persistência -----
            function loadUnlockedFromStorage() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { unlockedAchievements = JSON.parse(stored); } catch(e) { unlockedAchievements = {}; }
                } else {
                    unlockedAchievements = {};
                }
            }
            
            function saveUnlockedToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(unlockedAchievements));
            }

            loadUnlockedFromStorage();

            // Permite reconquistar após 2 segundos (mantém a experiência de "sempre ter feedback")
            setTimeout(() => {
                unlockedAchievements = {};
                console.log('[Conquistas] Sessão resetada – conquistas disponíveis novamente.');
            }, 2000);

            // ----- Fila de exibição (evita sobreposição) -----
            async function processQueue() {
                if (isQueueProcessing) return;
                isQueueProcessing = true;

                while (achievementQueue.length > 0) {
                    const achievement = achievementQueue.shift();
                    await showAchievementToast(achievement);
                    await new Promise(resolve => setTimeout(resolve, 300)); // pequeno intervalo entre toasts
                }

                isQueueProcessing = false;
            }

            // Exibe o toast e toca o áudio IMEDIATAMENTE
            function showAchievementToast(achievement) {
                return new Promise((resolve) => {
                    const container = document.getElementById('achievement-toast-container');
                    const toast = document.createElement('div');
                    toast.className = `achievement-toast rarity-${achievement.rarity.name}`;
                    
                    // Toca o som no mesmo instante (garantindo que o contexto de áudio já foi desbloqueado)
                    if (audioUnlocked && achievement.rarity.sound) {
                        const sound = achievement.rarity.sound;
                        sound.currentTime = 0;
                        sound.play().catch(e => console.warn('Erro ao tocar áudio da conquista:', e));
                    }
                    
                    toast.innerHTML = `
                        <div class="achievement-icon"></div>
                        <div class="achievement-content">
                            <div class="achievement-title">${achievement.name}</div>
                            <div class="achievement-description">Conquista desbloqueada!</div>
                        </div>
                        <div class="achievement-score"><span>🎮</span>${achievement.points}G</div>
                    `;
                    
                    container.appendChild(toast);
                    
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                        resolve();
                    }, 5000);
                });
            }

            // ----- API pública -----
            window.unlockAchievement = function(achievementId, name, rarity, customPoints = null) {
                if (!rarity || !RARITY[rarity]) return;
                
                const rarityObj = RARITY[rarity];
                const points = customPoints !== null ? customPoints : rarityObj.points;
                
                if (unlockedAchievements[achievementId]) {
                    console.log(`Conquista "${name}" já desbloqueada nesta sessão.`);
                    return;
                }
                
                unlockedAchievements[achievementId] = true;
                saveUnlockedToStorage();
                
                achievementQueue.push({
                    id: achievementId,
                    name: name,
                    rarity: rarityObj,
                    points: points
                });
                
                processQueue();
            };

            // ----- Desbloqueio de áudio no primeiro clique + conquista "Primeiro Acesso" -----
            function enableAudioOnFirstInteraction() {
                if (audioUnlocked) return;
                
                const allAudios = [audioCommon, audioUncommon, audioRare, clickSound, selectSound];
                allAudios.forEach(audio => {
                    if (audio) {
                        audio.load();
                        audio.play().then(() => {
                            audio.pause();
                            audio.currentTime = 0;
                        }).catch(() => {});
                    }
                });
                
                audioUnlocked = true;
                console.log('[Conquistas] Áudio desbloqueado.');
                
                if (!unlockedAchievements['first_access']) {
                    window.unlockAchievement('first_access', 'Primeiro Acesso', 'COMMON', 10);
                }
                
                document.removeEventListener('click', enableAudioOnFirstInteraction);
                document.removeEventListener('touchstart', enableAudioOnFirstInteraction);
            }

            document.addEventListener('click', enableAudioOnFirstInteraction, { once: true });
            document.addEventListener('touchstart', enableAudioOnFirstInteraction, { once: true });

            // ========== NOVOS GATILHOS DE CONQUISTAS (AJUSTADOS PARA DIFICULDADE) ==========

            // 1. Lightbox de imagem (ilustração/design) → COMMON (antes era incomum)
            const originalOpenLightbox = window.openLightbox;
            window.openLightbox = function(element) {
                if (originalOpenLightbox) originalOpenLightbox.call(this, element);
                else {
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    const imgSrc = element.querySelector('img').src;
                    lbVid.style.display = 'none';
                    lbVid.pause();
                    lbImg.src = imgSrc;
                    lbImg.style.display = 'block';
                    lb.style.display = 'flex';
                }
                window.unlockAchievement('art_viewer', 'Olheiro de Arte', 'COMMON', 10);
            };

            // 2. Lightbox de vídeo (animação) → UNCOMMON (antes era rara)
            const originalOpenLightboxVideo = window.openLightboxVideo;
            window.openLightboxVideo = function(videoSrc) {
                if (originalOpenLightboxVideo) originalOpenLightboxVideo.call(this, videoSrc);
                else {
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    lbImg.style.display = 'none';
                    lbVid.src = videoSrc;
                    lbVid.style.display = 'block';
                    lb.style.display = 'flex';
                    lbVid.play();
                }
                window.unlockAchievement('anim_lover', 'Apreciador de Animações', 'UNCOMMON', 25);
            };

            // 3. Link do YouTube → COMMON
            document.getElementById('youtube-link').addEventListener('click', function() {
                window.unlockAchievement('youtube_fan', 'Apoiador do Canal', 'COMMON', 10);
            });

            // 4. Botão "JOGAR BALL GAME" → UNCOMMON
            const ballGameItem = document.querySelector('.gallery-item.new-game-glow');
            if (ballGameItem) {
                ballGameItem.addEventListener('click', function() {
                    window.unlockAchievement('game_tester', 'Playtester Dedicado', 'UNCOMMON', 25);
                });
            }

            // 5. CONQUISTA SECRETA RARA: clicar 5 vezes no logo (header-logo)
            const logoElement = document.getElementById('secret-logo');
            let logoClickCount = 0;
            let logoClickTimer = null;
            logoElement.addEventListener('click', function(e) {
                e.stopPropagation(); // não interfere em outros cliques
                logoClickCount++;
                clearTimeout(logoClickTimer);
                logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000); // reseta após 2s sem clicar
                
                if (logoClickCount >= 5) {
                    window.unlockAchievement('secret_fan', 'Fã de Sins Ice2', 'RARE', 50);
                    logoClickCount = 0;
                    clearTimeout(logoClickTimer);
                }
            });

            // 6. (Opcional) Conquista RARA ao pressionar a tecla "S" (para quem sabe do segredo)
            document.addEventListener('keydown', function(e) {
                if (e.key === 's' || e.key === 'S') {
                    window.unlockAchievement('secret_key', 'Digitou S', 'RARE', 50);
                }
            });

            // Fallback para funções originais caso não definidas
            if (typeof window.openLightbox !== 'function') {
                window.openLightbox = function(element) {
                    const imgSrc = element.querySelector('img').src;
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    lbVid.style.display = 'none';
                    lbVid.pause();
                    lbImg.src = imgSrc;
                    lbImg.style.display = 'block';
                    lb.style.display = 'flex';
                };
            }
            if (typeof window.openLightboxVideo !== 'function') {
                window.openLightboxVideo = function(videoSrc) {
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    lbImg.style.display = 'none';
                    lbVid.src = videoSrc;
                    lbVid.style.display = 'block';
                    lb.style.display = 'flex';
                    lbVid.play();
                };
            }
            if (typeof window.closeLightbox !== 'function') {
                window.closeLightbox = function() {
                    const lb = document.getElementById('lightbox');
                    const lbVid = document.getElementById('lightbox-video');
                    lb.style.display = 'none';
                    if (lbVid) lbVid.pause();
                };
            }

            console.log('[Conquistas] Sistema FLASH 2010-2014 ativo. Boa sorte desbloqueando as raras!');
        })();
    </script>
</body>
</html>
