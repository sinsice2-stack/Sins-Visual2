<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sins Ice2 - Portfólio</title>
    <link rel="icon" type="image/x-icon" href="logo sinsice2 site.webp">
    
    <style>
        /* TRAVAS DE SEGURANÇA */
        * {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: url('fundosite.webp') no-repeat center center fixed;
            background-size: cover;
            -webkit-background-size: cover;
            color: #bc13fe; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        }

        .header-logo { max-width: 350px; margin: 0 auto 15px auto; }
        .header-logo img { width: 100%; height: auto; display: block; pointer-events: none; }

        .subtitle {
            font-size: 1rem;
            color: #bc13fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.5);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .info-box {
            background: rgba(22, 22, 22, 0.85); 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h2 { 
            color: #bc13fe; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.7);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .gallery-item:hover { transform: scale(1.02); border-color: #bc13fe; box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .gallery-caption {
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        #lightbox img, #lightbox video {
            max-width: 90%;
            max-height: 80%;
            border: 2px solid #bc13fe;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(188, 19, 254, 0.2);
            color: white;
            border: 1px solid #bc13fe;
            font-size: 2rem;
            padding: 15px;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 1010;
        }

        .nav-btn:hover { background: #bc13fe; box-shadow: 0 0 15px #bc13fe; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        #counter {
            position: absolute;
            bottom: 30px;
            color: #bc13fe;
            font-weight: bold;
        }

        /* ESTILO DO BOTÃO DO YOUTUBE */
        .actions { text-align: center; padding: 40px 0; }
        .btn-gif { display: inline-block; transition: transform 0.3s ease; max-width: 400px; cursor: pointer; }
        .btn-gif:hover { transform: scale(1.05); }
        .btn-gif img { width: 100%; height: auto; border-radius: 10px; pointer-events: none; }

        footer {
            text-align: center;
            padding: 40px;
            color: #bc13fe;
            font-size: 0.8rem;
            border-top: 1px solid rgba(188, 19, 254, 0.3);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div class="header-logo">
            <img src="logo sinsice2 site.webp" alt="Sins Ice2 Logo">
        </div>
        <div class="subtitle">13 anos • YouTuber • Animador • Compositor • Designer</div>
    </header>

    <div class="container">
        <div class="info-box">
            <h2>Portfólio</h2>
            <div class="gallery-grid">
                
                <div class="gallery-item" onclick="openGroup('animacao')">
                    <video autoplay loop muted playsinline>
                        <source src="bixo de espada.mp4" type="video/mp4">
                    </video>
                    <div class="gallery-caption">Minhas Animações</div>
                </div>

                <div class="gallery-item" onclick="openGroup('ilustracao')">
                    <img src="soldado.webp" alt="Ilustrações">
                    <div class="gallery-caption">Ilustrações</div>
                </div>

                <div class="gallery-item" onclick="openGroup('design')">
                    <img src="Design1.webp" alt="Design">
                    <div class="gallery-caption">Assets & Design</div>
                </div>

            </div>
        </div>

        <div class="actions">
            <a href="https://www.youtube.com/@Sinsice2" target="_blank" class="btn-gif">
                <img src="vireumgelo.gif" alt="Se inscreva no canal - Vire um Gelo">
            </a>
        </div>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <button id="btn-prev" class="nav-btn prev-btn" onclick="changeItem(-1)">&#10094;</button>
        
        <img id="lightbox-img" src="" style="display:none;" oncontextmenu="return false;">
        <video id="lightbox-video" controls loop style="display:none;" oncontextmenu="return false;"></video>
        
        <div id="counter"></div>
        <button id="btn-next" class="nav-btn next-btn" onclick="changeItem(1)">&#10095;</button>
    </div>

    <footer>
        <p>&copy; 2026 SINS ICE2 - Todos os direitos reservados.</p>
    </footer>

    <script>
        // BLOQUEIO DE TECLAS
        document.addEventListener('keydown', function(e) {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.ctrlKey && (e.key === "u" || e.key === "s"))) {
                e.preventDefault();
            }
        });

        // GRUPOS SEPARADOS (Cada tópico com seus próprios itens)
        const groups = {
            'animacao': [
                { type: 'video', src: 'bixo de espada.mp4' }
            ],
            'ilustracao': [
                { type: 'img', src: 'soldado.webp' },
                { type: 'img', src: 'Demencia.webp' }
            ],
            'design': [
                { type: 'img', src: 'Design1.webp' }
            ]
        };

        let currentGroup = [];
        let currentIdx = 0;

        function openGroup(groupName) {
            currentGroup = groups[groupName];
            currentIdx = 0;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
            
            const showBtns = currentGroup.length > 1 ? 'block' : 'none';
            document.getElementById('btn-prev').style.display = showBtns;
            document.getElementById('btn-next').style.display = showBtns;
        }

        function updateLightbox() {
            const lbImg = document.getElementById('lightbox-img');
            const lbVid = document.getElementById('lightbox-video');
            const counter = document.getElementById('counter');
            const item = currentGroup[currentIdx];

            counter.innerText = (currentIdx + 1) + ' / ' + currentGroup.length;

            if (item.type === 'img') {
                lbVid.style.display = 'none';
                lbVid.pause();
                lbImg.src = item.src;
                lbImg.style.display = 'block';
            } else {
                lbImg.style.display = 'none';
                lbVid.src = item.src;
                lbVid.style.display = 'block';
                lbVid.play();
            }
        }

        function changeItem(dir) {
            currentIdx += dir;
            if (currentIdx < 0) currentIdx = currentGroup.length - 1;
            if (currentIdx >= currentGroup.length) currentIdx = 0;
            updateLightbox();
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-video').pause();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
            if (currentGroup.length > 1) {
                if (e.key === "ArrowLeft") changeItem(-1);
                if (e.key === "ArrowRight") changeItem(1);
            }
        });
    </script>
</body>
</html>
