<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sins Ice2 - Portfólio</title>
    <style>
        /* TRAVAS DE SEGURANÇA E GERAL */
        * { -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: url('fundosite.webp') no-repeat center top fixed;
            background-size: 125%;
            color: #bc13fe; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        }

        .header-logo { max-width: 350px; margin: 0 auto 15px auto; }
        .header-logo img { width: 100%; height: auto; display: block; }

        .subtitle {
            font-size: 1rem;
            color: #bc13fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.5);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        .info-box {
            background: rgba(22, 22, 22, 0.85); 
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(188, 19, 254, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h2 { 
            color: #bc13fe; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.7);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .gallery-item:hover { 
            transform: translateY(-10px) scale(1.03); 
            border-color: #bc13fe; 
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.5);
        }

        .new-game-glow {
            border: 1px solid #bc13fe !important;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(188, 19, 254, 0.4); }
            50% { box-shadow: 0 0 20px rgba(188, 19, 254, 0.8); }
            100% { box-shadow: 0 0 5px rgba(188, 19, 254, 0.4); }
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-caption {
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #lightbox img, #lightbox video {
            max-width: 90%;
            max-height: 90%;
            border: 2px solid #bc13fe;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
        }

        .actions { text-align: center; padding: 40px 0; }
        .btn-gif { display: inline-block; transition: transform 0.3s ease; max-width: 400px; cursor: pointer; }
        .btn-gif:hover { transform: scale(1.1); }
        .btn-gif img { width: 100%; height: auto; border-radius: 10px; }

        footer {
            text-align: center;
            padding: 40px;
            color: #bc13fe;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(188, 19, 254, 0.3);
        }

        /* ===== SISTEMA DE CONQUISTAS ESTILO XBOX ===== */
        #achievement-toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            pointer-events: none;
        }

        .achievement-toast {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #2e2e2e;
            border-radius: 8px;
            padding: 16px 24px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(188, 19, 254, 0.3);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            transform: translateX(120%);
            animation: slideInOut 5s ease-in-out forwards;
            min-width: 280px;
            border-left: 6px solid;
        }

        /* Cores por raridade (borda esquerda) */
        .achievement-toast.rarity-common { border-left-color: #a0a0a0; }
        .achievement-toast.rarity-uncommon { border-left-color: #3a9b3a; }
        .achievement-toast.rarity-rare { border-left-color: #bc13fe; }

        .achievement-icon {
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .achievement-content {
            flex: 1;
        }

        .achievement-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .achievement-description {
            font-size: 13px;
            color: #aaa;
        }

        .achievement-score {
            font-size: 22px;
            font-weight: 700;
            color: #bc13fe;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.8);
            margin-left: 5px;
        }
        .achievement-score span {
            font-size: 14px;
            color: #ccc;
            margin-right: 3px;
        }

        @keyframes slideInOut {
            0% { transform: translateX(120%); opacity: 0; }
            10% { transform: translateX(0); opacity: 1; }
            85% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(120%); opacity: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Áudios originais do site -->
    <audio id="click-sound" src="click.mp3" preload="auto"></audio>
    <audio id="select-sound" src="select.mp3" preload="auto"></audio>

    <!-- Áudios das conquistas (serão gerenciados pelo sistema) -->
    <audio id="achievement-sound-common" src="conquista 1.mp3" preload="auto"></audio>
    <audio id="achievement-sound-uncommon" src="conquista 2.mp3" preload="auto"></audio>
    <audio id="achievement-sound-rare" src="conquista suprema.mp3" preload="auto"></audio>

    <header>
        <div class="header-logo">
            <img src="logo sinsice2 site.webp" alt="Sins Ice2 Logo">
        </div>
        <div class="subtitle">13 anos • YouTuber • Animador • Compositor • Designer</div>
    </header>

    <div class="container">
        
        <div class="info-box">
            <h2>Galeria de Projetos</h2>
            <div class="skills-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px;">
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎬 Animação</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎵 Composição</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">🎨 Arte Digital</div>
                <div style="background: rgba(40, 40, 40, 0.6); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid #bc13fe;">✒️ Design</div>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item" onclick="playSelect(); openLightboxVideo('bixo de espada.mp4')">
                    <video autoplay loop muted playsinline>
                        <source src="bixo de espada.mp4" type="video/mp4">
                    </video>
                    <div class="gallery-caption">Minhas Animações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="soldado.webp" alt="Soldado Zoiudo">
                    <div class="gallery-caption">Ilustrações</div>
                </div>

                <div class="gallery-item" onclick="playSelect(); openLightbox(this)">
                    <img src="Design1.webp" alt="Meu Design">
                    <div class="gallery-caption">Assets & Design</div>
                </div>
            </div>
        </div>

        <div class="info-box">
            <h2>Meus Jogos</h2>
            <div class="gallery-grid">
                <div class="gallery-item new-game-glow" onclick="playSelect(); window.open('ball game.html', '_blank');">
                    <img src="thumb ball game.webp" alt="Thumbnail Ball Game">
                    <div class="gallery-caption">🟢 JOGAR BALL GAME</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="https://www.youtube.com/@Sinsice2" target="_blank" class="btn-gif" id="youtube-link">
                <img src="vireumgelo.gif" alt="Se inscreva no canal - Vire um Gelo">
            </a>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" style="display:none;">
        <video id="lightbox-video" controls loop style="display:none;"></video>
    </div>

    <!-- Container para os toasts de conquista -->
    <div id="achievement-toast-container"></div>

    <footer>
        <p>&copy; 2026 SINS ICE2 - Todos os direitos reservados.</p>
    </footer>

    <script>
        // ======================== SCRIPTS ORIGINAIS (MODIFICADOS PARA INTEGRAR CONQUISTAS) ========================
        const clickSound = document.getElementById('click-sound');
        const selectSound = document.getElementById('select-sound');

        function playSelect() {
            if (selectSound) {
                selectSound.currentTime = 0;
                selectSound.play().catch(e => console.log("Erro som"));
            }
        }

        // Carrega os sons antecipadamente (útil para mobile)
        document.body.addEventListener('click', function() {
            clickSound.load();
            selectSound.load();
        }, { once: true });

        // ======================== SISTEMA DE CONQUISTAS (XBOX STYLE) ========================
        (function(){
            "use strict";

            // ----- Elementos de áudio -----
            const audioCommon = document.getElementById('achievement-sound-common');
            const audioUncommon = document.getElementById('achievement-sound-uncommon');
            const audioRare = document.getElementById('achievement-sound-rare');
            
            // ----- Configuração de raridade -----
            const RARITY = {
                COMMON: { name: 'common', sound: audioCommon, points: 15 },
                UNCOMMON: { name: 'uncommon', sound: audioUncommon, points: 30 },
                RARE: { name: 'rare', sound: audioRare, points: 50 }
            };

            // ----- Estado e fila -----
            let unlockedAchievements = {};          // Chaves das conquistas já desbloqueadas na sessão atual
            const STORAGE_KEY = 'sins_achievements';
            
            let isQueueProcessing = false;
            const achievementQueue = [];
            let audioUnlocked = false;               // Flag para autoplay (desbloqueado no primeiro clique)
            let firstClickHandlerAttached = false;

            // ----- Persistência (localStorage) -----
            function loadUnlockedFromStorage() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        unlockedAchievements = JSON.parse(stored);
                    } catch(e) {
                        unlockedAchievements = {};
                    }
                } else {
                    unlockedAchievements = {};
                }
            }
            
            function saveUnlockedToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(unlockedAchievements));
            }

            // Carrega inicial
            loadUnlockedFromStorage();

            // Após 2 segundos, permite reconquistar (limpa flags da sessão atual, mas mantém no storage para próxima recarga)
            setTimeout(() => {
                // Reseta apenas as flags em memória, assim novas conquistas podem ser ganhas novamente
                unlockedAchievements = {};
                console.log('[Conquistas] Sessão resetada – você pode ganhar conquistas novamente!');
                // Não salvamos no storage, pois queremos que ao recarregar a página o ciclo se repita.
            }, 2000);

            // ----- Fila de exibição (evita sobreposição) -----
            async function processQueue() {
                if (isQueueProcessing) return;
                isQueueProcessing = true;

                while (achievementQueue.length > 0) {
                    const achievement = achievementQueue.shift();
                    await showAchievementToast(achievement);
                    // Pequena pausa entre conquistas consecutivas (opcional)
                    await new Promise(resolve => setTimeout(resolve, 300));
                }

                isQueueProcessing = false;
            }

            // Exibe o toast e toca o áudio correspondente, retorna Promise que resolve quando a animação termina (5s)
            function showAchievementToast(achievement) {
                return new Promise((resolve) => {
                    const container = document.getElementById('achievement-toast-container');
                    const toast = document.createElement('div');
                    toast.className = `achievement-toast rarity-${achievement.rarity.name}`;
                    
                    // Ícone de troféu com cor baseada na raridade (simples)
                    let iconColor = '#a0a0a0';
                    if (achievement.rarity === RARITY.UNCOMMON) iconColor = '#3a9b3a';
                    if (achievement.rarity === RARITY.RARE) iconColor = '#bc13fe';
                    
                    toast.innerHTML = `
                        <div class="achievement-icon" style="color: ${iconColor};">🏆</div>
                        <div class="achievement-content">
                            <div class="achievement-title">${achievement.name}</div>
                            <div class="achievement-description">Conquista desbloqueada!</div>
                        </div>
                        <div class="achievement-score"><span>🎮</span>${achievement.points}G</div>
                    `;
                    
                    container.appendChild(toast);
                    
                    // Toca o áudio correspondente (se desbloqueado)
                    if (audioUnlocked && achievement.rarity.sound) {
                        const sound = achievement.rarity.sound;
                        sound.currentTime = 0;
                        sound.play().catch(e => console.warn('Erro ao tocar áudio da conquista:', e));
                    }
                    
                    // Remove o toast após a animação (5s)
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                        resolve();
                    }, 5000);
                });
            }

            // ----- API pública para desbloquear conquista -----
            window.unlockAchievement = function(achievementId, name, rarity, customPoints = null) {
                // Se não houver raridade válida, sai
                if (!rarity || !RARITY[rarity]) {
                    console.error('Raridade inválida:', rarity);
                    return;
                }
                
                const rarityObj = RARITY[rarity];
                const points = customPoints !== null ? customPoints : rarityObj.points;
                
                // Verifica se já foi desbloqueada nesta sessão (após delay pode estar limpo)
                if (unlockedAchievements[achievementId]) {
                    console.log(`Conquista "${name}" já foi desbloqueada nesta sessão.`);
                    return;
                }
                
                // Marca como desbloqueada e salva
                unlockedAchievements[achievementId] = true;
                saveUnlockedToStorage();
                
                // Adiciona à fila
                achievementQueue.push({
                    id: achievementId,
                    name: name,
                    rarity: rarityObj,
                    points: points
                });
                
                // Inicia processamento se não estiver em andamento
                processQueue();
            };

            // ----- Desbloqueio de áudio no primeiro clique (prevenção de autoplay) + conquista "Primeiro Acesso" -----
            function enableAudioOnFirstInteraction() {
                if (audioUnlocked) return;
                
                // Força carregamento e reprodução silenciosa para desbloquear contexto
                const allAudios = [audioCommon, audioUncommon, audioRare, clickSound, selectSound];
                allAudios.forEach(audio => {
                    if (audio) {
                        audio.load();
                        // Tenta tocar e pausar imediatamente para "desbloquear"
                        audio.play().then(() => {
                            audio.pause();
                            audio.currentTime = 0;
                        }).catch(() => {});
                    }
                });
                
                audioUnlocked = true;
                console.log('[Conquistas] Áudio desbloqueado pelo primeiro clique.');
                
                // Dispara conquista "Primeiro Acesso" (Simples/Comum)
                // Verifica se já não foi desbloqueada (pode ter sido resetada após delay, mas queremos garantir que só toque uma vez por "sessão ativa")
                if (!unlockedAchievements['first_access']) {
                    window.unlockAchievement('first_access', 'Primeiro Acesso', 'COMMON', 10);
                }
                
                // Remove o listener global após o primeiro clique
                document.removeEventListener('click', enableAudioOnFirstInteraction);
                document.removeEventListener('touchstart', enableAudioOnFirstInteraction);
            }

            // Adiciona listeners para o primeiro clique/toque
            document.addEventListener('click', enableAudioOnFirstInteraction, { once: true });
            document.addEventListener('touchstart', enableAudioOnFirstInteraction, { once: true });

            // ----- Conexão com eventos existentes (exemplos de conquistas) -----
            // Para demonstrar, adicionamos conquistas em algumas interações já existentes.
            
            // 1. Ao abrir lightbox de imagem (Ilustrações ou Design) -> Conquista Incomum
            const originalOpenLightbox = window.openLightbox;
            window.openLightbox = function(element) {
                // Chama função original
                if (originalOpenLightbox) originalOpenLightbox.call(this, element);
                else {
                    // Fallback caso não definido (segurança)
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    const imgSrc = element.querySelector('img').src;
                    lbVid.style.display = 'none';
                    lbVid.pause();
                    lbImg.src = imgSrc;
                    lbImg.style.display = 'block';
                    lb.style.display = 'flex';
                }
                // Conquista: "Olheiro de Arte" (Incomum)
                window.unlockAchievement('art_viewer', 'Olheiro de Arte', 'UNCOMMON', 25);
            };

            // 2. Ao abrir lightbox de vídeo (animação) -> Conquista Rara
            const originalOpenLightboxVideo = window.openLightboxVideo;
            window.openLightboxVideo = function(videoSrc) {
                if (originalOpenLightboxVideo) originalOpenLightboxVideo.call(this, videoSrc);
                else {
                    const lb = document.getElementById('lightbox');
                    const lbImg = document.getElementById('lightbox-img');
                    const lbVid = document.getElementById('lightbox-video');
                    lbImg.style.display = 'none';
                    lbVid.src = videoSrc;
                    lbVid.style.display = 'block';
                    lb.style.display = 'flex';
                    lbVid.play();
                }
                window.unlockAchievement('anim_lover', 'Mestre da Animação', 'RARE', 50);
            };

            // 3. Clicar no link do YouTube (GIF) -> Conquista Comum (mas com som especial)
            document.getElementById('youtube-link').addEventListener('click', function(e) {
                // Não impede navegação, apenas dispara conquista
                window.unlockAchievement('youtube_fan', 'Apoiador do Canal', 'COMMON', 15);
            });

            // 4. Clicar no botão "JOGAR BALL GAME" -> Conquista Rara
            const ballGameItem = document.querySelector('.gallery-item.new-game-glow');
            if (ballGameItem) {
                // Já tem onclick, vamos adicionar um listener extra para não sobrescrever
                ballGameItem.addEventListener('click', function(e) {
                    // A conquista só será disparada se o clique não for no link (o window.open já vai abrir)
                    window.unlockAchievement('game_tester', 'Playtester Dedicado', 'RARE', 50);
                });
            }

            // Também podemos adicionar conquista ao fechar lightbox (apenas exemplo)
            const originalCloseLightbox = window.closeLightbox;
            window.closeLightbox = function() {
                if (originalCloseLightbox) originalCloseLightbox.call(this);
                else {
                    document.getElementById('lightbox').style.display = 'none';
                    const vid = document.getElementById('lightbox-video');
                    if (vid) vid.pause();
                }
                // Conquista opcional: "Fechou a Galeria" (Comum)
                // window.unlockAchievement('gallery_closer', 'Curador Rápido', 'COMMON', 5);
            };

            console.log('[Conquistas] Sistema iniciado. Aguardando primeiro clique para desbloquear áudio...');
        })();

        // ======================== FUNÇÕES ORIGINAIS (caso não tenham sido sobrescritas) ========================
        // Garantir definições padrão se não existirem (por segurança)
        if (typeof window.openLightbox !== 'function') {
            window.openLightbox = function(element) {
                const imgSrc = element.querySelector('img').src;
                const lb = document.getElementById('lightbox');
                const lbImg = document.getElementById('lightbox-img');
                const lbVid = document.getElementById('lightbox-video');
                lbVid.style.display = 'none';
                lbVid.pause();
                lbImg.src = imgSrc;
                lbImg.style.display = 'block';
                lb.style.display = 'flex';
            };
        }
        if (typeof window.openLightboxVideo !== 'function') {
            window.openLightboxVideo = function(videoSrc) {
                const lb = document.getElementById('lightbox');
                const lbImg = document.getElementById('lightbox-img');
                const lbVid = document.getElementById('lightbox-video');
                lbImg.style.display = 'none';
                lbVid.src = videoSrc;
                lbVid.style.display = 'block';
                lb.style.display = 'flex';
                lbVid.play();
            };
        }
        if (typeof window.closeLightbox !== 'function') {
            window.closeLightbox = function() {
                const lb = document.getElementById('lightbox');
                const lbVid = document.getElementById('lightbox-video');
                lb.style.display = 'none';
                if (lbVid) lbVid.pause();
            };
        }
    </script>
</body>
</html>
